version: "3.9"

# ── Production compose ─────────────────────────────────────────────────────────
# Frontend built and served by nginx.
# DB port NOT exposed externally.
# All secrets provided via a .env file (never committed).
#
# Usage:
#   cp .env.example .env           # fill in all values
#   docker compose -f docker-compose.prod.yml up -d

services:

  # ── PostgreSQL ───────────────────────────────────────────────────────────────
  db:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_DB:       ${METADATA_DB_NAME}
      POSTGRES_USER:     ${METADATA_DB_USER}
      POSTGRES_PASSWORD: ${METADATA_DB_PASSWORD}
    volumes:
      - ./postgres_data:/var/lib/postgresql/data
    # Port intentionally NOT exposed in production
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${METADATA_DB_USER} -d ${METADATA_DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 10

  # ── Backend (FastAPI / uvicorn) ───────────────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    restart: unless-stopped
    environment:
      METADATA_DB_HOST:     db
      METADATA_DB_PORT:     5432
      METADATA_DB_NAME:     ${METADATA_DB_NAME}
      METADATA_DB_USER:     ${METADATA_DB_USER}
      METADATA_DB_PASSWORD: ${METADATA_DB_PASSWORD}
      IN_PRODUCTION:        "true"
      GEMINI_API_KEY:       ${GEMINI_API_KEY}
    depends_on:
      db:
        condition: service_healthy
    # Port NOT exposed directly — nginx proxies to it
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health')\""]
      interval: 30s
      timeout: 10s
      retries: 3

  # ── Frontend (nginx, pre-built Vue SPA) ──────────────────────────────────────
  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy
