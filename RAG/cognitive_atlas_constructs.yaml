    ca_id: trm_N7MLgAsJBIbiQ
    definition_text: Trust means believing that another person will do what is expected.
      It brings with it a willingness for one party (the trustor) to become vulnerable
      to another party (the trustee), on the presumption that the trustee will act
      in ways that benefit the trustor (From https://en.wikipedia.org/wiki/Trust_(social_science)).
  reactive_control:
    label: Reactive Control
    standard_code: reactive_control
    ca_id: trm_0wLVVlkHaAov9
    definition_text: During reactive mode, cognitive control is transiently activated
      only after the cognitively demanding event has occurred.
    broader:
    - cognitive_control
  venturesomeness:
    label: Venturesomeness
    standard_code: venturesomeness
    ca_id: trm_2gvDOFhX4ILY3
    definition_text: Venturesomeness is defined as being conscious of the risk but
      acting anyway.
  behavioral_approach_system:
    label: Behavioral Approach System
    standard_code: behavioral_approach_system
    ca_id: trm_QlrVatUMhmg3s
    definition_text: in reinforcement sensitivity theory, the physiological mechanism
      believed to control appetitive motivation. It is theorized to be sensitive to
      signals of reward, nonpunishment, and escape from punishment. Activity in this
      system causes the individual to begin (or to increase) movement toward goals.
      It has also been held that this system is responsible for the experience of
      positive feelings such as hope, elation, and happiness in response to these
      signals and that having a strong or chronically active BAS tends to result in
      extraversion. Also called behavioral activation system
  mindfulness:
    label: Mindfulness
    standard_code: mindfulness
    ca_id: trm_wzUYYp7Av6Unt
    definition_text: awareness of one’s internal states and surroundings. The concept
      has been applied to various therapeutic interventions—for example, mindfulness-based
      cognitive behavior therapy, mindfulness-based stress reduction, and mindfulness
      meditation—to help people avoid destructive or automatic habits and responses
      by learning to observe their thoughts, emotions, and other present-moment experiences
      without judging or reacting to them.
  interpersonal_conflict:
    label: Interpersonal Conflict
    standard_code: interpersonal_conflict
    ca_id: trm_30rzOgVoBsNqo
    definition_text: disagreement or discord between people with respect to goals,
      values, or attitudes.
  self_efficacy:
    label: Self-Efficacy
    standard_code: self_efficacy
    ca_id: trm_Z1PwwmQJy6oB7
    definition_text: an individual’s subjective perception of his or her capability
      to perform in a given setting or to attain desired results, proposed by Albert
      Bandura as a primary determinant of emotional and motivational states and behavioral
      change.
  coercion:
    label: Coercion
    standard_code: coercion
    ca_id: trm_H5TZwxrcaUSBI
    definition_text: the process of attempting to influence another person through
      the use of threats, punishment, force, direct pressure, and other negative forms
      of power.
  demand:
    label: Demand
    standard_code: demand
    ca_id: trm_f01v8jugwrqHl
    definition_text: requirement or urgent need, particularly any internal or external
      condition that arouses a drive in an organism.
  coping:
    label: Coping
    standard_code: coping
    ca_id: trm_hwkommxKgvKas
    definition_text: the use of cognitive and behavioral strategies to manage the
      demands of a situation when these are appraised as taxing or exceeding one’s
      resources or to reduce the negative emotions and conflict caused by stress.
  behavioral_inibition_system:
    label: Behavioral Inibition System
    standard_code: behavioral_inibition_system
    ca_id: trm_v97yWIWghz10Z
    definition_text: in reinforcement sensitivity theory, the physiological mechanism
      believed to control aversive motivation. It is theorized to be sensitive to
      signals of punishment and nonreward. Activity in this system suppresses behavior
      that may lead to negative or painful outcomes and inhibits movement toward goals.
      It has also been held that this system is responsible for the experience of
      negative feelings such as fear, anxiety, frustration, and sadness in response
      to these signals and that having a strong or chronically active BIS tends to
      result in introversion
  cognitive_warfare:
    label: 'Cognitive warfare '
    standard_code: cognitive_warfare
    ca_id: trm_7J8bZcxhab2mR
    definition_text: ' the activities conducted in synchronization with other instruments
      of power, to affect attitudes and behaviours by manipulating , changing ,influencing,
      protecting, and/or disrupting individual and group cognitions to gain an advantage.Cognitive
      Warfare integrates cyber, information, psychological, and social engineering
      capabilities. '
  reciprocity:
    label: reciprocity
    standard_code: reciprocity
    ca_id: trm_seBaaqL9E7Q1v
    definition_text: Reciprocity, as a fundamental principle in social psychology,
      revolves around the concept that individuals tend to respond to the actions
      of others in a manner that mirrors the positive or negative nature of those
      actions. It involves a mutual exchange of behaviors and reactions, where individuals
      reciprocate the same type of behavior they have received from others[2] (Molm
      et al., 2007) (From https://en.wikipedia.org/wiki/Reciprocity_(social_psychology)).
  mastery_orientation:
    label: Mastery Orientation
    standard_code: mastery_orientation
    ca_id: trm_LoNlAQafora4r
    definition_text: an adaptive pattern of achievement behavior in which individuals
      enjoy and seek challenge, persist in the face of obstacles, and tend to view
      their failings as due to lack of effort or poor use of strategy rather than
      to lack of ability.
  physical_activity:
    label: Physical Activity
    standard_code: physical_activity
    ca_id: trm_t3L0j7X6p66JK
    definition_text: any bodily movement produced by contraction of skeletal muscle
      that increases energy expenditure above the basal level.
  cognitive_warfare_1:
    label: 'Cognitive warfare '
    standard_code: cognitive_warfare_1
    ca_id: trm_cz5r7bGDpqiwn
    definition_text: ' the activities conducted in synchronization with other instruments
      of power, to affect attitudes and behaviours by manipulating , changing ,influencing,
      protecting, and/or disrupting individual and group cognitions to gain an advantage.Cognitive
      Warfare integrates cyber, information, psychological, and social engineering
      capabilities. '
  anxiety_sensitivity:
    label: 'anxiety sensitivity '
    standard_code: anxiety_sensitivity
    ca_id: trm_2aZtye4tjHl4U
    definition_text: Anxiety Sensitivity (AS) is defined in terms of fear of anxiety-related
      sensations due to beliefs about what those sensations mean (Reiss et al., 1986)
  dyadic_effect:
    label: Dyadic Effect
    standard_code: dyadic_effect
    ca_id: trm_pNo3F5h7B8Eg7
    definition_text: That part of the behavior of two interacting individuals that
      is the product of their particular interaction and that is distinct from the
      way in which each characteristically relates to others.
  interoceptive_awareness:
    label: Interoceptive awareness
    standard_code: interoceptive_awareness
    ca_id: trm_WoLBai9ycl8yE
    definition_text: the ability to identify, access, understand, and respond appropriately
      to the patterns of internal signal
  marital_conflict:
    label: Marital Conflict
    standard_code: marital_conflict
    ca_id: trm_s3yxeUMCHAo7j
    definition_text: Open or latent antagonism between marriage partners. The nature
      and intensity of conflicts varies greatly, but studies indicate that the prime
      sources are often sexual disagreement, child-rearing differences, temperamental
      differences (particularly the tendency of one partner to dominate), and, to
      a lesser extent, religious differences, differences in values and interests,
      and disagreements over money management.
