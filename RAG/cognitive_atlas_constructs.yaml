cognitive_construct:
  abductive_reasoning:
    label: abductive reasoning
    standard_code: abductive_reasoning
    ca_id: trm_4a3fd79d096be
    definition_text: The process of adopting an explanatory hypothesis; inferring
      the cause A as a possible explanation for the consequence B.
    broader:
    - reasoning
  abstract_analogy:
    label: abstract analogy
    standard_code: abstract_analogy
    ca_id: trm_4a3fd79d096e3
    definition_text: high-level analogy that retains general information relevant
      to many specific instances
    broader:
    - analogy
  abstract_knowledge:
    label: abstract knowledge
    standard_code: abstract_knowledge
    ca_id: trm_4a3fd79d096f0
    definition_text: Knowledge that is general and not tied to a specific instance.
    broader:
    - knowledge
  acoustic_coding:
    label: acoustic coding
    standard_code: acoustic_coding
    ca_id: trm_4a3fd79d096fc
    definition_text: a type of short term memory coding that represents the acoustic
      properties of the signal
    part_of:
    - auditory_perception
  acoustic_encoding:
    label: acoustic encoding
    standard_code: acoustic_encoding
    ca_id: trm_4a3fd79d09707
    definition_text: the processing and encoding of auditory input for storage and
      later retrieval.
    broader:
    - encoding
    part_of:
    - auditory_coding
    - auditory_memory
    - auditory_perception
  acoustic_phonetic_processing:
    label: acoustic phonetic processing
    standard_code: acoustic_phonetic_processing
    ca_id: trm_4a3fd79d09713
    definition_text: "the cognitive ability to discriminate items on the basis of\
      \ contrasts in sonorance, manner, place, or voicing in auditory stimuli.\r\n"
    broader:
    - auditory_perception
    part_of:
    - speech_perception
  acoustic_processing:
    label: acoustic processing
    standard_code: acoustic_processing
    ca_id: trm_4a3fd79d0971e
    definition_text: the extraction of information from signals propagated undersea,
      in the atmosphere, or in the solid earth in the presence of acoustic noise.
    part_of:
    - music_perception
  action:
    label: action
    standard_code: action
    ca_id: trm_4a3fd79d09735
    definition_text: the bringing about of an alteration by force or through a natural
      agency; expression by means of attitude, voice, and gesture; a function of the
      body or one of its parts; an act of will; a thing done; the accomplishment of
      a thing usually over a period of time, in stages, or with the possibility of
      repetition.
  activation:
    label: activation
    standard_code: activation
    ca_id: trm_4a3fd79d09741
    definition_text: the relative engagement of a particular mental representation
      compared to other representations
  activation_level:
    label: activation level
    standard_code: activation_level
    ca_id: trm_4a3fd79d0974d
    definition_text: quantity or amount of activation
  adaptation:
    label: adaptation
    standard_code: adaptation
    ca_id: trm_4a3fd79d09758
    definition_text: 'adjustment to environmental conditions; adjustment of a sense
      organ to the intensity or quality of stimulation; modification of an organism
      or its parts that makes it more fit for existence under the conditions of its
      environment. '
  adaptive_control:
    label: adaptive control
    standard_code: adaptive_control
    ca_id: trm_4a3fd79d09764
    definition_text: modifying the control law used by a controller to cope with the
      fact that the parameters of the system being controlled are slowly time-varying
      or uncertain.
  affect_perception:
    label: affect perception
    standard_code: affect_perception
    ca_id: trm_4a3fd79d09770
    definition_text: The ability to understand a facial, vocal, or gestural behavior
      that serves as an indicator of emotion.
  affect_recognition:
    label: affect recognition
    standard_code: affect_recognition
    ca_id: trm_4a3fd79d0977b
    definition_text: The ability to understand a physical expression that serves as
      an indicator of emotion.
  altruism:
    label: altruism
    standard_code: altruism
    ca_id: trm_4a3fd79d097b4
    definition_text: helping others in the absence of an immediately obvious reward.
    synonyms:
    - term: selflessness
      weight: 0.7
  altruistic_motivation:
    label: altruistic motivation
    standard_code: altruistic_motivation
    ca_id: trm_4a3fd79d097bf
    definition_text: A desire or need to help others driven by selflessness.
  alveolar:
    label: alveolar
    standard_code: alveolar
    ca_id: trm_4a3fd79d097cb
    definition_text: speech sound articulated with the tip of the tongue touching
      or near the teethridge.
  amodal_representation:
    label: amodal representation
    standard_code: amodal_representation
    ca_id: trm_4a3fd79d097d6
    definition_text: The way the brain codes multiple inputs such as words and pictures
      to integrate and create a larger conceptual idea; independent of a particular
      modality
    broader:
    - mental_representation
  analog_representation:
    label: analog representation
    standard_code: analog_representation
    ca_id: trm_4a3fd79d097e2
    definition_text: a value or variable in analog form.
  analogical_encoding:
    label: analogical encoding
    standard_code: analogical_encoding
    ca_id: trm_4a3fd79d097ed
    definition_text: the structural comparison of a familiar with a novel situation
    broader:
    - analogical_reasoning
    - encoding
  analogical_inference:
    label: analogical inference
    standard_code: analogical_inference
    ca_id: trm_4a3fd79d097f9
    definition_text: "is the ability to reason by permitting the extension of knowledge\
      \ of a target domain by virtue of its similarity to a base domain. The general\
      \ procedure for analogical inference involves copying structure from the base\
      \ to the target in which missing information is generated, and substitutions\
      \ are made for items for which analogical correspondences have already been\
      \ found.\r\n"
    broader:
    - inference
  analogical_problem_solving:
    label: analogical problem solving
    standard_code: analogical_problem_solving
    ca_id: trm_4a3fd79d09804
    definition_text: using principles or concepts from a well-understood situation
      to solve problems in a new domain or area
  analogical_reasoning:
    label: analogical reasoning
    standard_code: analogical_reasoning
    ca_id: trm_4a3fd79d09810
    definition_text: a method of processing information that compares the similarities
      between new and understood concepts, then uses those similarities to gain understanding
      of the new concept; a form of inductive reasoning.
    broader:
    - reasoning
  analogical_transfer:
    label: analogical transfer
    standard_code: analogical_transfer
    ca_id: trm_4a3fd79d0981b
    definition_text: The transfer of knowledge from one situation to another by finding
      a set of one-to-one correspondences between aspects of one body of information
      and aspects of another.
  analogy:
    label: analogy
    standard_code: analogy
    ca_id: trm_4a3fd79d09827
    definition_text: inference that if two or more things agree with one another in
      some respects they will probably agree in others; resemblance in some particulars
      between things otherwise unlike; correspondence between the members of pairs
      or sets of linguistic forms that serves as a basis for the creation of another
      form; correspondence in function between anatomical parts of different structure
      and origin.
    broader:
    - inference
  anchoring:
    label: anchoring
    standard_code: anchoring
    ca_id: trm_4a3fd79d09833
    definition_text: a cognitive bias that describes the common human tendency to
      rely too heavily, or &#34;anchor,&#34; on one trait or piece of information
      when making decisions.
    broader:
    - cognitive_heuristic
  anticipation:
    label: anticipation
    standard_code: anticipation
    ca_id: trm_4a3fd79d09849
    definition_text: prior expectation of an event or occurrence, sometimes accompanied
      by an emotional reaction
    part_of:
    - oddball_detection
    - monetary_reward_prediction_error
    - proactive_control
    - imagination
    synonyms:
    - term: intuition
      weight: 0.7
    - term: foreknowledge
      weight: 0.7
    - term: prescience
      weight: 0.7
    - term: foresight
      weight: 0.7
    - term: prediction
      weight: 0.7
    - term: imaginative speculation
      weight: 0.7
  apparent_motion:
    label: apparent motion
    standard_code: apparent_motion
    ca_id: trm_4a3fd79d09855
    definition_text: The illusory perception that movement is occurring in one or
      more static images.
    broader:
    - optical_illusion
    - visual_perception
    synonyms:
    - term: apparent movement
      weight: 0.7
  apperception:
    label: apperception
    standard_code: apperception
    ca_id: trm_4a3fd79d0986c
    definition_text: the process by which new experience is assimilated to and transformed
      by the residuum of past experience of an individual to form a new whole.
  appetitive_motivation:
    label: appetitive motivation
    standard_code: appetitive_motivation
    ca_id: trm_4a3fd79d09877
    definition_text: 'behavior directed toward goals that are usually associated with
      positive hedonic processes.  '
    part_of:
    - pavlovian_bias
  arousal:
    label: arousal
    standard_code: arousal
    ca_id: trm_4a3fd79d09883
    definition_text: Disambiguation
  articulation:
    label: articulation
    standard_code: articulation
    ca_id: trm_4a3fd79d0988f
    definition_text: the act of vocally producing an utterance or expression
  articulatory_planning:
    label: articulatory planning
    standard_code: articulatory_planning
    ca_id: trm_4a3fd79d0989a
    definition_text: 'The action of coordinating complex tongue and mouth movements
      in order to produce sound. '
    part_of:
    - speech_production
  articulatory_rehearsal:
    label: articulatory rehearsal
    standard_code: articulatory_rehearsal
    ca_id: trm_4a3fd79d098a6
    definition_text: 'the process of subvocally repeating material that is to be stored
      in memory.  '
    broader:
    - rehearsal
    part_of:
    - rehearsal_loop
  assimilation:
    label: assimilation
    standard_code: assimilation
    ca_id: trm_4a3fd79d098b2
    definition_text: the process of receiving new facts or of responding to new situations
      in conformity with what is already available to consciousness.
    broader:
    - explicit_learning
  association:
    label: association
    standard_code: association
    ca_id: trm_4a3fd79d098bd
    definition_text: the process of forming mental connections or bonds between sensations,
      ideas, or memories.
    part_of:
    - memory
  association_learning:
    label: association learning
    standard_code: association_learning
    ca_id: trm_4a3fd79d098c9
    definition_text: learning process in which two or more items or concepts become
      associated with each other; often used in relation to learned stimulus-response
      associations
    broader:
    - implicit_learning_1
    part_of:
    - instrumental_conditioning
  attachment:
    label: attachment
    standard_code: attachment
    ca_id: trm_4a3fd79d098e0
    definition_text: a social connection between individuals
  attended_channel:
    label: attended channel
    standard_code: attended_channel
    ca_id: trm_4a3fd79d098eb
    definition_text: 'the particular input, out of two or more, that is consciously
      perceived due to attention.  '
  attended_stimulus:
    label: attended stimulus
    standard_code: attended_stimulus
    ca_id: trm_4a3fd79d098f7
    definition_text: the specific object in the environment on which attention is
      focused.
  attention:
    label: attention
    standard_code: attention
    ca_id: trm_4a3fd79d09902
    definition_text: used to describe any number of cognitive processes, organized
      as top-down or bottom-up, goal-directed or stimulus-driven, and more, but generally
      reflecting an interplay between cognitive and sensory systems.
    part_of:
    - visual_search
    - attentional_blink
    - consciousness
  attention_capacity:
    label: attention capacity
    standard_code: attention_capacity
    ca_id: trm_4a3fd79d0990e
    definition_text: refers to the extent that one can allocate their processing resources.
    part_of:
    - attention
  attentional_effort:
    label: attentional effort
    standard_code: attentional_effort
    ca_id: trm_4a3fd79d09919
    definition_text: a motivated activation of attention systems in order to stabilize
      or recover attentional performance in response to the detection of errors and
      reward loss or, more generally, deteriorating attentional performance; amount
      of attentional resources needed for a particular situation; engagement of attentional
      resources
    broader:
    - effort
    part_of:
    - cognitive_effort
  attentional_resources:
    label: attentional resources
    standard_code: attentional_resources
    ca_id: trm_4a3fd79d09925
    definition_text: amount of available attentional capacity
    broader:
    - resource
  attentional_state:
    label: attentional state
    standard_code: attentional_state
    ca_id: trm_4a3fd79d09930
    definition_text: referring to amount of attentional resources being engaged;  a
      relaxed attentional state requires little attentional effort, whereas an alert,
      focused attentional state requires more
  attitude:
    label: attitude
    standard_code: attitude
    ca_id: trm_4a3fd79d09947
    definition_text: a mental position with regard to a fact or state
    broader:
    - mindset
  audiovisual_perception:
    label: audiovisual perception
    standard_code: audiovisual_perception
    ca_id: trm_4a3fd79d09953
    definition_text: "a single unified awareness derived from the integration of auditory\
      \ and visual sensory processes when a audiovisual stimulus is present. \r\n\r\
      \n"
    broader:
    - perception
  audition:
    label: audition
    standard_code: audition
    ca_id: trm_4a3fd79d0995e
    definition_text: the sense or act of hearing.
    part_of:
    - perception
    synonyms:
    - term: auditory
      weight: 0.7
  auditory_attention:
    label: auditory attention
    standard_code: auditory_attention
    ca_id: trm_4a3fd79d09a10
    definition_text: "is the cognitive process of selectively concentrating on one\
      \ auditory stream in the environment while ignoring others.\r\n"
    broader:
    - attention
  auditory_coding:
    label: auditory coding
    standard_code: auditory_coding
    ca_id: trm_4a3fd79d09a3d
    definition_text: processing and encoding of sound, words, and all other auditory
      input for storage and later retrieval. According to Baddeley, processing of
      auditory information is aided by the concept of the phonological loop, which
      allows input within our echoic memory.
    broader:
    - encoding
    part_of:
    - auditory_perception
  auditory_encoding:
    label: auditory encoding
    standard_code: auditory_encoding
    ca_id: trm_4a3fd79d09a49
    definition_text: 'the process of storing auditory information in memory.  '
    broader:
    - encoding
    part_of:
    - memory_storage
  auditory_feedback:
    label: auditory feedback
    standard_code: auditory_feedback
    ca_id: trm_4a3fd79d09a55
    definition_text: "is provided by auditory stimulation in response to specific\
      \ behavior. The feedback may be used to amend subsequent behavior, cognition,\
      \ perception or performance.\r\n"
    broader:
    - feedback_processing
  auditory_grouping:
    label: auditory grouping
    standard_code: auditory_grouping
    ca_id: trm_4a3fd79d09a61
    definition_text: joining disparate sounds together into one percept; assessing
      which acoustic streams belong together
    part_of:
    - auditory_perception
  auditory_imagery:
    label: auditory imagery
    standard_code: auditory_imagery
    ca_id: trm_4a3fd79d09a6c
    definition_text: the subjective experience of hearing in the absence of auditory
      stimulation.
  auditory_learning:
    label: auditory learning
    standard_code: auditory_learning
    ca_id: trm_4a3fd79d09a78
    definition_text: learning of auditorily presented information
  auditory_lexical_access:
    label: auditory lexical access
    standard_code: auditory_lexical_access
    ca_id: trm_4a3fd79d09a84
    definition_text: "The process by which the basic sound-meaning connections of\
      \ language, i.e., lexical entries, are activated.\r\n"
    part_of:
    - lexical_processing
  auditory_localization:
    label: auditory localization
    standard_code: auditory_localization
    ca_id: trm_4a3fd79d09a8f
    definition_text: a listener&#39;s ability to identify the location or origin of
      a detected sound.
    broader:
    - localization
    part_of:
    - auditory_perception
  auditory_masking:
    label: auditory masking
    standard_code: auditory_masking
    ca_id: trm_4a3fd79d09a9b
    definition_text: the perception of one sound is affected by the presence of another
      sound; presenting a sound to interfere with or terminate a target sound
  auditory_memory:
    label: auditory memory
    standard_code: auditory_memory
    ca_id: trm_4a3fd79d09aa7
    definition_text: the cognitive capacity of storing and retrieving information
      related to sound.
    broader:
    - memory
    part_of:
    - music_perception
  auditory_perception:
    label: auditory perception
    standard_code: auditory_perception
    ca_id: trm_4a3fd79d09ab2
    definition_text: The ability to identify, interpret, and attach meaning to sound.
    broader:
    - perception
    part_of:
    - audiovisual_perception
  auditory_scene:
    label: auditory scene
    standard_code: auditory_scene
    ca_id: trm_4a3fd79d09abe
    definition_text: auditory scene analysis is the process by which the human auditory
      system organizes sound into perceptually meaningful elements.
  auditory_scene_analysis:
    label: auditory scene analysis
    standard_code: auditory_scene_analysis
    ca_id: trm_4a3fd79d09aca
    definition_text: the process by which the human auditory system organizes sound
      into perceptually meaningful elements.
    part_of:
    - music_perception
  auditory_sentence_comprehension:
    label: auditory sentence comprehension
    standard_code: auditory_sentence_comprehension
    ca_id: trm_4a3fd79d09ad5
    definition_text: 'ability to combine auditory words into a meaningful sentence
      unit. '
    broader:
    - sentence_comprehension
  auditory_stream_segregation:
    label: auditory stream segregation
    standard_code: auditory_stream_segregation
    ca_id: trm_4a3fd79d09ae1
    definition_text: the perceptual grouping of sounds to form coherent representations
      of objects in the acoustic scene; a fundamental aspect of hearing and speech
      perception.
    part_of:
    - auditory_perception
    - speech_perception
  auditory_word_comprehension:
    label: auditory word comprehension
    standard_code: auditory_word_comprehension
    ca_id: trm_4a3fd79d09aed
    definition_text: ability to parse acoustic signals into meaningful words
    broader:
    - word_comprehension
    part_of:
    - language
    - speech_perception
  auditory_word_recognition:
    label: auditory word recognition
    standard_code: auditory_word_recognition
    ca_id: trm_4a3fd79d09af8
    definition_text: ability to recognize acoustically presented words
    broader:
    - word_recognition
    - auditory_recognition
    part_of:
    - auditory_sentence_recognition
  auditory_working_memory:
    label: auditory working memory
    standard_code: auditory_working_memory
    ca_id: trm_4a3fd79d09b04
    definition_text: Working memory for auditory information
    broader:
    - working_memory
  autobiographical_memory:
    label: autobiographical memory
    standard_code: autobiographical_memory
    ca_id: trm_4a3fd79d09b10
    definition_text: "a memory system consisting of episodes recollected from an individualâ\x80\
      \x99s life, based on a combination of episodic (personal experiences and specific\
      \ objects, people and events experienced at particular time and place) and semantic\
      \ (general knowledge and facts about the world) memory."
    broader:
    - episodic_memory
  autobiographical_recall:
    label: autobiographical recall
    standard_code: autobiographical_recall
    ca_id: trm_4a3fd79d09b1c
    definition_text: "episodes recollected from an individualâ\x80\x99s life, based\
      \ on a combination of episodic (personal experiences and specific objects, people\
      \ and events experienced at particular time and place) and semantic (general\
      \ knowledge and facts about the world) memory. "
    broader:
    - recall
    part_of:
    - autobiographical_memory
  automaticity:
    label: automaticity
    standard_code: automaticity
    ca_id: trm_4a3fd79d09b28
    definition_text: behavior performed without intention
  availability_heuristic:
    label: availability heuristic
    standard_code: availability_heuristic
    ca_id: trm_4a3fd79d09b33
    definition_text: 'A heuristic in which people predict the frequency of classes
      or the probability of events based on the ease with which relevant instances
      come to mind. '
    broader:
    - cognitive_heuristic
  aversive_learning:
    label: aversive learning
    standard_code: aversive_learning
    ca_id: trm_4a3fd79d09b3f
    definition_text: behavior modification using an adverse stimulus in response to
      the inappropriate or undesirable behavior.
    part_of:
    - aversive_salience
  backward_chaining:
    label: backward chaining
    standard_code: backward_chaining
    ca_id: trm_4a3fd79d09b62
    definition_text: an inference method used in automated theorem provers, proof
      assistants and other artificial intelligence applications.  Backward chaining
      starts with a list of goals (or a hypothesis) and works backwards from the consequent
      to the antecedent to see if there is data available that will support any of
      these consequents.
  behavioral_inhibition:
    label: behavioral inhibition
    standard_code: behavioral_inhibition
    ca_id: trm_4a3fd79d09b79
    definition_text: Disambiguation
    broader:
    - self_control
  belief:
    label: belief
    standard_code: belief
    ca_id: trm_4a3fd79d09b85
    definition_text: a state or habit of mind in which trust or confidence is placed
      in some person or thing; conviction of the truth of some statement or the reality
      of some being or phenomenon especially when based on examination of evidence.
  binocular_convergence:
    label: binocular convergence
    standard_code: binocular_convergence
    ca_id: trm_4a3fd79d09b9c
    definition_text: 'when you look at an object that is closer than approximately
      25 feet, your eyes must converge on the object to perceive it as a single object
      clearly in focus.&#34; '
    broader:
    - binocular_depth_cue
  binocular_disparity:
    label: binocular disparity
    standard_code: binocular_disparity
    ca_id: trm_4a3fd79d09bb3
    definition_text: the difference in image location of an object seen by the left
      and right eyes, resulting from the eyes&#39; horizontal separation. The brain
      uses binocular disparity to extract depth information from the two-dimensional
      retinal images  in stereopsis.
    part_of:
    - stereopsis
  binocular_vision:
    label: binocular vision
    standard_code: binocular_vision
    ca_id: trm_4a3fd79d09bbf
    definition_text: is vision in which both eyes are used together.  Having two eyes
      confers at least four advantages over having one. First, it gives a creature
      a spare eye in case one is damaged. Second, it gives a wider field of view.  Third,
      it gives binocular summation in which the ability to detect faint objects is
      enhanced.  Fourth it can give stereopsis in which parallax provided by the two
      eyes&#39; different positions on the head give precise depth perception.  Such
      binocular vision is usually accompanied by singleness of vision or binocular
      fusion, in which a single image is seen despite each eye&#39;s having its own
      image of any object.  Other phenomena of binocular vision include utrocular
      discrimination, eye dominance, allelotropia, and binocular rivalry.
    part_of:
    - binocular_depth_cue
  bitterness:
    label: bitterness
    standard_code: bitterness
    ca_id: trm_4a3fd79d09bcb
    definition_text: being or inducing the one of the four basic taste sensations
      that is peculiarly acrid, astringent, or disagreeable; marked by intensity or
      severity; marked by cynicism and rancor; intensely unpleasant especially in
      coldness or rawness; expressive of severe pain, grief, or regret.
  body_orientation:
    label: body orientation
    standard_code: body_orientation
    ca_id: trm_4a3fd79d09be2
    definition_text: perception of the orientation of the body overall relative to
      other objects in the environment
    broader:
    - proprioception
  capacity_limitation:
    label: capacity limitation
    standard_code: capacity_limitation
    ca_id: trm_4a3fd79d09bee
    definition_text: a limitation on the capacity to process information
    part_of:
    - working_memory
  case_based_reasoning:
    label: case based reasoning
    standard_code: case_based_reasoning
    ca_id: trm_4a3fd79d09bf9
    definition_text: the process of solving new problems based on the solutions of
      similar past problems.
  categorical_clustering:
    label: categorical clustering
    standard_code: categorical_clustering
    ca_id: trm_4a3fd79d09c05
    definition_text: the clustering of recalled items based on category membership
  categorical_knowledge:
    label: categorical knowledge
    standard_code: categorical_knowledge
    ca_id: trm_4a3fd79d09c11
    definition_text: "knowledge about different attributes and uses of an object that\
      \ allows it to be placed in a group of objects with similar attributes and uses.\r\
      \n"
    broader:
    - knowledge
  categorical_perception:
    label: categorical perception
    standard_code: categorical_perception
    ca_id: trm_4a3fd79d09c1c
    definition_text: 'A form of perception in which the individual perceives a categorical
      distinction rather than a continuous scale of a varying perceptual feature.  '
    part_of:
    - face_perception
    - speech_perception
    - color_perception
  categorization:
    label: categorization
    standard_code: categorization
    ca_id: trm_4a3fd79d09c28
    definition_text: The assignment of a stimulus to one of a set of categories
    broader:
    - decision_making
  category_based_induction:
    label: category based induction
    standard_code: category_based_induction
    ca_id: trm_4a3fd79d09c34
    definition_text: 'requires that information about one set of categories is used
      to infer something about another category. A set of premises establishes that
      one or more categories possess a certain property.  The premises are followed
      by an assertion (the conclusion) that a target category also possesses that
      property. '
  category_learning:
    label: category learning
    standard_code: category_learning
    ca_id: trm_4a3fd79d09c3f
    definition_text: "is a strategy which requires a learner to compare and contrast\
      \ groups or categories that contain concept-relevant features with groups or\
      \ categories that do not contain concept-relevant features.\r\n"
  causal_inference:
    label: causal inference
    standard_code: causal_inference
    ca_id: trm_4a3fd79d09c5b
    definition_text: The process of inferring that one state/object/event causes the
      occurrence of another state/object/event.
    broader:
    - inference
  central_attention:
    label: central attention
    standard_code: central_attention
    ca_id: trm_4a3fd79d09c69
    definition_text: is the cognitive process that allows one to focus on the most
      important and relevant train of thought that needs to be attended to in a specific
      situation.
  centration:
    label: centration
    standard_code: centration
    ca_id: trm_4a3fd79d09c74
    definition_text: the tendency to focus on one aspect of a situation and neglect
      others.
  chemonociception:
    label: chemonociception
    standard_code: chemonociception
    ca_id: trm_4a3fd79d09c80
    definition_text: perception of stimulation by noxious chemical agents
  chromatic_contrast:
    label: chromatic contrast
    standard_code: chromatic_contrast
    ca_id: trm_4a3fd79d09c97
    definition_text: When a small patch is surrounded by a color field, the patch
      appears to be tinted in the opponent color of the surrounding field.
  chunk:
    label: chunk
    standard_code: chunk
    ca_id: trm_4a3fd79d09ca3
    definition_text: Structure in memory that is used as a unit of knowledge representation.
      Also refers to the process of learning by which these units are acquired.
  chunking:
    label: chunking
    standard_code: chunking
    ca_id: trm_4a3fd79d09cae
    definition_text: "The process of recoding information by splitting or reorganizing\
      \ it into smaller parts. \r\nActually: combining several smaller items into\
      \ a larger &#34;group&#34; item, i.e.: 3 separate &#34;incoming aircraft&#34;\
      \ considered as &#34;3 incoming aircraft&#34;. Significantly reduces the working\
      \ memory space used. Likely concept model for computer programming data-forms\
      \ that list pointers to numerous specific data. Larger classes of concepts include:\
      \ Learning and Memory, Attention, Action (Planning), Executive Control."
    part_of:
    - working_memory
  cognitive_development:
    label: cognitive development
    standard_code: cognitive_development
    ca_id: trm_4a3fd79d09d35
    definition_text: the construction of thought processes, including remembering,
      problem solving, and decision-making, from childhood through adolescence to
      adulthood.
  cognitive_dissonance:
    label: cognitive dissonance
    standard_code: cognitive_dissonance
    ca_id: trm_4a3fd79d09d41
    definition_text: The mental state in which a person holds multiple conflicting
      ideas simultaneously
  cognitive_effort:
    label: cognitive effort
    standard_code: cognitive_effort
    ca_id: trm_4a3fd79d09d4d
    definition_text: Consciously or intentionally engaging cognitive resources in
      order to achieve a particular end.
    broader:
    - effort
    synonyms:
    - term: mental effort
      weight: 0.7
  cognitive_heuristic:
    label: cognitive heuristic
    standard_code: cognitive_heuristic
    ca_id: trm_4a3fd79d09d58
    definition_text: are simple, efficient rules, hard-coded by evolutionary processes
      or learned, which have been proposed to explain how people make decisions, come
      to judgments, and solve problems, typically when facing complex problems or
      incomplete information. These rules work well under most circumstances, but
      in certain cases lead to systematic errors or cognitive biases.
  cognitive_load:
    label: cognitive load
    standard_code: cognitive_load
    ca_id: trm_4a3fd79d09d64
    definition_text: The amount of demand placed on working memory, typically expressed
      along some continuum and within a theoretical maximum.
    synonyms:
    - term: cognitive effort
      weight: 0.7
    - term: processing capacity
      weight: 0.7
  cognitive_map:
    label: cognitive map
    standard_code: cognitive_map
    ca_id: trm_4a3fd79d09d70
    definition_text: a type of mental processing composed of a series of psychological
      transformations by which an individual can acquire, code, store, recall, and
      decode information about the relative locations and attributes of phenomena
      in their everyday or metaphorical spatial environment.
  color_perception:
    label: color perception
    standard_code: color_perception
    ca_id: trm_4a3fd79d09d93
    definition_text: The process of distinguishing objects based on the wavelengths
      of the light they reflect or emit.
  communication:
    label: communication
    standard_code: communication
    ca_id: trm_4a3fd79d09d9e
    definition_text: a process by which information is exchanged between individuals
      through a common system of symbols, signs, or behavior.
  competition:
    label: competition
    standard_code: competition
    ca_id: trm_4a3fd79d09daa
    definition_text: the act or process of competing; active demand by two or more
      organisms or kinds of organisms for some environmental resource in short supply;
      a contest between rivals.
  concept:
    label: concept
    standard_code: concept
    ca_id: trm_4a3fd79d09db6
    definition_text: "a cognitive unit of meaningâ\x80\x94an abstract  idea or a mental\
      \ symbol  sometimes defined as a &#34;unit of knowledge,&#34; built from other\
      \ units which act as a concept&#39;s characteristics."
  concept_learning:
    label: concept learning
    standard_code: concept_learning
    ca_id: trm_4a3fd79d09dc1
    definition_text: "Concept learning, also known as category learning and concept\
      \ attainment, is largely based on the works of the cognitive psychologist Jerome\
      \ Bruner. Bruner, Goodnow, & Austin (1967) defined concept attainment (or concept\
      \ learning) as &#34;the search for and listing of attributes that can be used\
      \ to distinguish exemplars from non exemplars of various categories.&#34; More\
      \ simply put, concepts are the mental categories that help us classify objects,\
      \ events, or ideas and each object, event, or idea has a set of common relevant\
      \ features. Thus, concept learning is a strategy which requires a learner to\
      \ compare and contrast groups or categories that contain concept-relevant features\
      \ with groups or categories that do not contain concept-relevant features.\r\
      \n"
  conceptual_category:
    label: conceptual category
    standard_code: conceptual_category
    ca_id: trm_4a3fd79d09dcd
    definition_text: a way of organizing information, generally derived from experience;
      they can be part of a hierarchy, as in a taxonomy, or without, as in an alphabet.
  conceptual_coherence:
    label: conceptual coherence
    standard_code: conceptual_coherence
    ca_id: trm_4a3fd79d09dd9
    definition_text: combining a set concepts to make sense of a situation or set
      of situations.
  conceptual_planning:
    label: conceptual planning
    standard_code: conceptual_planning
    ca_id: trm_4a3fd79d09de4
    definition_text: in linguistics, a flexible process of preparation pertaining
      to grammatical structure of clauses, occurring both before and during production
      thereof
    part_of:
    - speech_production
  conceptual_skill:
    label: conceptual skill
    standard_code: conceptual_skill
    ca_id: trm_4a3fd79d09df0
    definition_text: is the ability to form concepts about abstract and complex ideas
      such as communication, language, time, and money, for example.
  conceptualization:
    label: conceptualization
    standard_code: conceptualization
    ca_id: trm_4a3fd79d09dfc
    definition_text: to form a concept of; to interpret.
  conditional_reasoning:
    label: conditional reasoning
    standard_code: conditional_reasoning
    ca_id: trm_4a3fd79d09e07
    definition_text: "the reasoner must draw a conclusion based on a conditional,\
      \ or â\x80\x9Cifâ\x80¦then,â\x80\x9D proposition."
    broader:
    - reasoning
  conflict_detection:
    label: conflict detection
    standard_code: conflict_detection
    ca_id: trm_4a3fd79d09e13
    definition_text: arises in the presence of concurrently active, mutually exclusive
      representations
    broader:
    - detection
  conjunction_search:
    label: conjunction search
    standard_code: conjunction_search
    ca_id: trm_4a3fd79d09e1e
    definition_text: the process of searching for a target that is not defined by
      any single unique visual feature, but by a combination of two or more features.
    broader:
    - visual_search
  connotation:
    label: connotation
    standard_code: connotation
    ca_id: trm_4a3fd79d09e2a
    definition_text: the suggesting of a meaning by a word apart from the thing it
      explicitly names or describes; something suggested by a word or thing; the signification
      of something; an essential property or group of properties of a thing named
      by a term in logic.
  consciousness:
    label: consciousness
    standard_code: consciousness
    ca_id: trm_4a3fd79d09e35
    definition_text: "the quality or state of being aware especially of something\
      \ within oneself; the state or fact of being conscious of an external object,\
      \ state, or fact; the state of being characterized by sensation, emotion, volition,\
      \ and thought; the totality of conscious states of an individual; the normal\
      \ state of conscious life,(regained consciousness); the upper level of mental\
      \ life of which the person is aware as contrasted with unconscious processes.\r\
      \n"
    synonyms:
    - term: awareness
      weight: 0.7
  constancy:
    label: constancy
    standard_code: constancy
    ca_id: trm_4a3fd79d09e58
    definition_text: steadfastness of mind under duress; a state of being constant
      or unchanging.
  constituent_structure:
    label: constituent structure
    standard_code: constituent_structure
    ca_id: trm_4a3fd79d09e64
    definition_text: "is an analysis, often in the form of a schematic representation,\
      \ of the constituents of a construction, such as a sentence.\r\n"
  context:
    label: context
    standard_code: context
    ca_id: trm_4a3fd79d09e6f
    definition_text: A set of interrelated conditions in which something exists or
      occurs (e.g., a style of language in a particular passage, activity of a given
      regions given sensory input).
    part_of:
    - context_representation
  context_dependent:
    label: context dependent
    standard_code: context_dependent
    ca_id: trm_4a3fd79d09e7b
    definition_text: "is a class of memory that refers to improved recall of specific\
      \ episodes or information when the context present at encoding and retrieval\
      \ are the same.\r\n"
  context_memory:
    label: context memory
    standard_code: context_memory
    ca_id: trm_4a3fd79d09e87
    definition_text: refers to improved recall of specific episodes or information
      when the context present at encoding and retrieval are similar.
    broader:
    - memory
  contextual_knowledge:
    label: contextual knowledge
    standard_code: contextual_knowledge
    ca_id: trm_4a3fd79d09e93
    definition_text: 'information, and/or skills that have particular meaning because
      of the conditions that form part of their description. '
  contingency_learning:
    label: contingency learning
    standard_code: contingency_learning
    ca_id: trm_4a3fd79d09e9e
    definition_text: Learning of the contingencies between different events
    part_of:
    - addiction
  contrastive_stress:
    label: contrastive stress
    standard_code: contrastive_stress
    ca_id: trm_4a3fd79d09eaa
    definition_text: No definition submitted yet
  conventionality:
    label: conventionality
    standard_code: conventionality
    ca_id: trm_4a3fd79d09eb6
    definition_text: 'the quality, fact, or condition of being conventional; conventional
      behavior or act; a conventional form, usage, or rule. '
  convergent_thinking:
    label: convergent thinking
    standard_code: convergent_thinking
    ca_id: trm_4a3fd79d09ece
    definition_text: analytical, usually deductive, thinking in which ideas are examined
      for their logical validity or in which a set of rules is followed.
  conversation:
    label: conversation
    standard_code: conversation
    ca_id: trm_4a3fd79d09eda
    definition_text: An exchange of sentiments, observations, opinions, or ideas.
  conversational_skill:
    label: conversational skill
    standard_code: conversational_skill
    ca_id: trm_4a3fd79d09ee6
    definition_text: Ability to engage in appropriate communication of sentiments,
      observations, opinions, or ideas through dialogue.
  conversational_speech:
    label: conversational speech
    standard_code: conversational_speech
    ca_id: trm_4a3fd79d09ef0
    definition_text: is interactive, more-or-less spontaneous, communication between
      two or more conversants. Interactivity occurs because contributions to a conversation
      are response reactions to what has previously been said. Spontaneity occurs
      because a conversation must proceed, to some extent, and in some way, unpredictably.
  conversational_structure:
    label: conversational structure
    standard_code: conversational_structure
    ca_id: trm_4a3fd79d09efb
    definition_text: "is the organization of interactive, more-or-less spontaneous,\
      \ communication between two or more conversants.\r\n"
  coordination:
    label: coordination
    standard_code: coordination
    ca_id: trm_4a3fd79d09f07
    definition_text: 'is the act of coordinating, making different people or things
      work together for a goal or effect.  '
  coproduction:
    label: coproduction
    standard_code: coproduction
    ca_id: trm_4a3fd79d09f12
    definition_text: No definition submitted yet
  coreference:
    label: coreference
    standard_code: coreference
    ca_id: trm_4a3fd79d09f1e
    definition_text: a relationship between two words or phrases in which both refer
      to the same person or thing and one stands as a linguistic antecedent of the
      other.
  creative_cognition:
    label: creative cognition
    standard_code: creative_cognition
    ca_id: trm_4a3fd79d09f2a
    definition_text: "involves two types of processes: generative processes and exploratory\
      \ processes. \r\n\r\nGenerative processes are those that most of us think about\
      \ when we think of creativity. They are the processes by which creative concepts\
      \ are first born. These processes are highly visible in extreme acts of creativity,\
      \ but they are also evident in ordinary, everyday cognition.  Examples (from\
      \ Ward et al.(cited below)) include memory retrieval, association formation\
      \ among information retrieved from memory, combinations of structures retrieved\
      \ from memory, the synthesis of new structures, the transformation of retrieved\
      \ structures into &#34;new forms,&#34; analogical transfer between domains,\
      \ and &#34;categorical reduction,&#34; which involves reducing existing structures\
      \ to &#34;more primitive constituents&#34;.  \r\n\r\nExploratory processes are\
      \ the processes used to explore the structures produced by generative processes.\
      \ Examples of exploratory processes (given by Ward, et al.) include searching\
      \ retrieved structures for &#34;novel attributes,&#34; searching for &#34;metaphorical\
      \ implications,&#34; searching for possible functions, &#34;the evaluation of\
      \ structures from different perspectives or within different contexts,&#34;\
      \ interpretation of structures from the perspective of the problem(s) to be\
      \ solved, and &#34;the search for various practical or conceptual limitations\
      \ that are suggested by the structures.&#34;\r\n"
  creative_problem_solving:
    label: creative problem solving
    standard_code: creative_problem_solving
    ca_id: trm_4a3fd79d09f36
    definition_text: the mental process of independently creating a solution to a
      problem without learned assistance.
  creative_thinking:
    label: creative thinking
    standard_code: creative_thinking
    ca_id: trm_4a3fd79d09f42
    definition_text: the intellectually disciplined process of actively and skillfully
      conceptualizing, applying, analyzing, synthesizing, and/or evaluating information
      gathered from, or generated by, observation, experience, reflection, reasoning,
      or communication, as a guide to belief and action (Scriven & Paul, 1992).
  critical_period:
    label: critical period
    standard_code: critical_period
    ca_id: trm_4a3fd79d09f4d
    definition_text: a limited time in which an event can occur, usually to result
      in some kind of transformation; in developmental psychology and developmental
      biology, it is a time in the early stages of an organism&#39;s life during which
      it displays a heightened sensitivity to certain environmental stimuli, and develops
      in particular ways due to experiences at this time.
  crosstalk:
    label: crosstalk
    standard_code: crosstalk
    ca_id: trm_4a3fd79d09f59
    definition_text: interference by information presented via multiple channels
  crystallized_intelligence:
    label: crystallized intelligence
    standard_code: crystallized_intelligence
    ca_id: trm_4a3fd79d09f64
    definition_text: the ability to utilize previously acquired knowledge and experience.
  cue_dependent_forgetting:
    label: cue dependent forgetting
    standard_code: cue_dependent_forgetting
    ca_id: trm_4a3fd79d09f70
    definition_text: is the failure to recall a memory due to missing stimuli or cues
      that were present at the time the memory was encoded.
    broader:
    - forgetting
  cue_validity:
    label: cue validity
    standard_code: cue_validity
    ca_id: trm_4a3fd79d09f7c
    definition_text: the conditional probability that an object falls in a particular
      category given a particular feature or cue.
  cueing:
    label: cueing
    standard_code: cueing
    ca_id: trm_4a3fd79d09f87
    definition_text: to give/present a stimulus that prompts a reaction.
  dative_shift:
    label: dative shift
    standard_code: dative_shift
    ca_id: trm_4a3fd79d0a006
    definition_text: a grammatical process by which an oblique  argument of a verb,
      usually one functioning as a recipient or a benefactive (roles often expressed
      by datives), is placed in the same grammatical role as a patient, increasing
      the valency of the verb and forming a clause with two objects.
  decay_of_activation:
    label: decay of activation
    standard_code: decay_of_activation
    ca_id: trm_4a3fd79d0a021
    definition_text: An explanation for why spreading activation, in network-based
      models of knowledge representation, peters out as a function of the distance
      between nodes.
    part_of:
    - spreading_activation
  deception:
    label: deception
    standard_code: deception
    ca_id: trm_4a3fd79d0a02c
    definition_text: an act to propagate beliefs that are not true, or not the whole
      truth (as in half-truths or omission).
  decision_making:
    label: decision making
    standard_code: decision_making
    ca_id: trm_4a3fd79d0a038
    definition_text: 'The deliberate selection of a single alternative amongst multiple
      alternatives. '
    part_of:
    - set_shifting
  declarative_knowledge:
    label: declarative knowledge
    standard_code: declarative_knowledge
    ca_id: trm_4a3fd79d0a044
    definition_text: Knowledge that is descriptive and includes knowing &#34;that&#34;
      rather than knowing &#34;how&#34; (can be expressed in declarative sentences).
    broader:
    - knowledge
  declarative_memory:
    label: declarative memory
    standard_code: declarative_memory
    ca_id: trm_4a3fd79d0a04f
    definition_text: Memory for facts, and that can be intentionally articulated in
      some manner.
    broader:
    - memory
    - long_term_memory
  declarative_rule:
    label: declarative rule
    standard_code: declarative_rule
    ca_id: trm_4a3fd79d0a05b
    definition_text: A criterion for which one possesses declarative knowledge. Contrasts
      with an implicit or non-declarative rule, which one might follow but not represent
      as a rule or even be aware that they are following.
    broader:
    - declarative_knowledge
    part_of:
    - rule_learning
  deductive_inference:
    label: deductive inference
    standard_code: deductive_inference
    ca_id: trm_4a3fd79d0a066
    definition_text: A type of inference in which the conclusion always follows from
      the stated premises.If the premises are true, then the conclusion is valid.
    broader:
    - inference
  deductive_reasoning:
    label: deductive reasoning
    standard_code: deductive_reasoning
    ca_id: trm_4a3fd79d0a072
    definition_text: "is reasoning which constructs or evaluates deductive arguments.\
      \ Deductive arguments are attempts to show that a conclusion necessarily follows\
      \ from a set of premises or hypotheses.\r\n"
    broader:
    - reasoning
  deep_processing:
    label: deep processing
    standard_code: deep_processing
    ca_id: trm_4a3fd79d0a07e
    definition_text: Evaluating a piece of information in terms of meaning or associations
      to other concepts as opposed to surface or incidental characteristics.
  deep_structure:
    label: deep structure
    standard_code: deep_structure
    ca_id: trm_4a3fd79d0a08a
    definition_text: The essential meaning of a sentence, without regard to the grammatical
      features (surface structure) of the sentence that are needed to express it in
      words.
  depth_cue:
    label: depth cue
    standard_code: depth_cue
    ca_id: trm_4a3fd79d0a095
    definition_text: 'Depth perception arises from a variety of depth cues. These
      are typically classified into binocular cues that require input from both eyes
      and monocular cues that require the input from just one eye.  Binocular cues
      include stereopsis, yielding depth from binocular vision through exploitation
      of parallax. Monocular cues include size: distant objects subtend smaller visual
      angles than near objects.  A third class of cues requires synthetic integration
      of binocular and monocular cues.'
  depth_perception:
    label: depth perception
    standard_code: depth_perception
    ca_id: trm_4a3fd79d0a0a1
    definition_text: Ability to perceive the visual world in three dimensions.
    broader:
    - perception
  desire:
    label: desire
    standard_code: desire
    ca_id: trm_4a3fd79d0a0ad
    definition_text: to long or hope for, exhibit or feel desire for; to express a
      wish for.
  diphthong:
    label: diphthong
    standard_code: diphthong
    ca_id: trm_4a3fd79d0a0dc
    definition_text: a gliding monosyllabic speech sound (as the vowel combination
      at the end of toy) that starts at or near the articulatory position for one
      vowel and moves to or toward the position of another.
  dispositions:
    label: dispositions
    standard_code: dispositions
    ca_id: trm_4a3fd79d0a0e7
    definition_text: 'Tendency to act in a particular manner given a certain set of
      antecedents. '
  distraction:
    label: distraction
    standard_code: distraction
    ca_id: trm_4a3fd79d0a0f3
    definition_text: Any event that interrupts a mental process.
  distributed_coding:
    label: distributed coding
    standard_code: distributed_coding
    ca_id: trm_4a3fd79d0a0ff
    definition_text: A type of coding in which the information that constitutes a
      concept (or mental representation) is spread amongst a number of constituent
      representations.
  divergent_thinking:
    label: divergent thinking
    standard_code: divergent_thinking
    ca_id: trm_4a3fd79d0a10a
    definition_text: a thought process or method used to generate creative ideas by
      exploring many possible solutions.
  divided_attention:
    label: divided attention
    standard_code: divided_attention
    ca_id: trm_4a3fd79d0a116
    definition_text: A state in which the focus of attention is spread across more
      than one object or event.
    broader:
    - attention
    part_of:
    - lateral_masking
  dream:
    label: dream
    standard_code: dream
    ca_id: trm_4a3fd79d0a12d
    definition_text: a succession of thoughts, images, sounds or emotions which the
      mind experiences during sleep.
  efficiency:
    label: efficiency
    standard_code: efficiency
    ca_id: trm_4a3fd79d0a145
    definition_text: effective operation as measured by a comparison of production
      with cost (as in energy, time, money, or cortical activity)
  effort:
    label: effort
    standard_code: effort
    ca_id: trm_4a3fd79d0a151
    definition_text: Consciously or intentionally engaging resources in order to achieve
      a particular end.
  effortful_processing:
    label: effortful processing
    standard_code: effortful_processing
    ca_id: trm_4a3fd79d0a15c
    definition_text: learning or storing (encoding) that requires attention and effort.
  egocentric:
    label: egocentric
    standard_code: egocentric
    ca_id: trm_4a3fd79d0a168
    definition_text: A frame of reference centered around the self. In perception,
      a first-person frame of reference.
  elaborative_processing:
    label: elaborative processing
    standard_code: elaborative_processing
    ca_id: trm_4a3fd79d0a173
    definition_text: Processing in which semantic associations or relations between
      words/concepts are generated or elaborated on.
  emotion:
    label: emotion
    standard_code: emotion
    ca_id: trm_4a3fd79d0a17f
    definition_text: a complex of psychological phenomena that involve some degree
      of arousal and valence (positive/negative)
  emotional_decision_making:
    label: emotional decision making
    standard_code: emotional_decision_making
    ca_id: trm_4a3fd79d0a18b
    definition_text: The use of affective information as information in a decision
      making process or as a basis for making a decision. Hot cognition.
    broader:
    - decision_making
  emotional_expression:
    label: emotional expression
    standard_code: emotional_expression
    ca_id: trm_4a3fd79d0a196
    definition_text: observable verbal and nonverbal behavior that communicates emotion
      with or without self-awareness.
    part_of:
    - emotion
  emotional_intelligence:
    label: emotional intelligence
    standard_code: emotional_intelligence
    ca_id: trm_4a3fd79d0a1a2
    definition_text: the capacity, skill or ability to identify, assess, and manage
      the emotions of one&#39;s self, of others, and of groups.
  emotional_memory:
    label: emotional memory
    standard_code: emotional_memory
    ca_id: trm_4a3fd79d0a1ae
    definition_text: 'Emotional memory is the storage and recall of events and details
      that are couple with the physiological response that was present when the event
      occurred.  '
    broader:
    - memory
  emotional_mimicry:
    label: emotional mimicry
    standard_code: emotional_mimicry
    ca_id: trm_4a3fd79d0a1b9
    definition_text: 'is the ability of a person to imitate, copy, and experience
      the physical and emotional characteristics of another persons emotion.  '
  emotional_suppression:
    label: emotional suppression
    standard_code: emotional_suppression
    ca_id: trm_4a3fd79d0a1d1
    definition_text: A process to reduce or inhibit the impact of an emotion on ones
      current conscious state or behavior.
    broader:
    - emotion_regulation
  episodic_learning:
    label: episodic learning
    standard_code: episodic_learning
    ca_id: trm_4a3fd79d0a1e8
    definition_text: a change in behavior that occurs as a result of an event; episodic
      learning is so named because events are recorded into episodic memory.
  episodic_memory:
    label: episodic memory
    standard_code: episodic_memory
    ca_id: trm_4a3fd79d0a1f4
    definition_text: memory of autobiographical events (times, places, associated
      emotions, and other contextual knowledge) that can be explicitly stated.
    broader:
    - declarative_memory
    part_of:
    - consciousness
  error_detection:
    label: error detection
    standard_code: error_detection
    ca_id: trm_4a3fd79d0a20c
    definition_text: Processes that identify when an error has been made.
    part_of:
    - performance_monitoring
  error_signal:
    label: error signal
    standard_code: error_signal
    ca_id: trm_4a3fd79d0a218
    definition_text: An event following error detection, in which a sign is relayed
      notifying the advent of an error.
  error_trapping:
    label: error trapping
    standard_code: error_trapping
    ca_id: trm_4a3fd79d0a223
    definition_text: procedures that detect and correct errors before the errors cause
      further confusion.
  excitation:
    label: excitation
    standard_code: excitation
    ca_id: trm_4a3fd79d0a22f
    definition_text: a state of increased emotional arousal
  expertise:
    label: expertise
    standard_code: expertise
    ca_id: trm_4a3fd79d0a25e
    definition_text: Having a highly cultivated level of skill in a particular domain.
      Occurs after prolonged experience in a domain.
  explicit_knowledge:
    label: explicit knowledge
    standard_code: explicit_knowledge
    ca_id: trm_4a3fd79d0a269
    definition_text: Knowledge that can be articulated or expressed intentionally.
    broader:
    - knowledge
  explicit_learning:
    label: explicit learning
    standard_code: explicit_learning
    ca_id: trm_4a3fd79d0a275
    definition_text: Acquisition of skills and/or knowledge actively and with awareness.
      Typically such learning is accompanied by meta-awareness - individuals can explain
      how they acquired the skill/knowledge.
    broader:
    - learning
  explicit_memory:
    label: explicit memory
    standard_code: explicit_memory
    ca_id: trm_4a3fd79d0a281
    definition_text: the conscious, intentional recollection of previous experiences
      and information.
    broader:
    - declarative_memory
  extrinsic_motivation:
    label: extrinsic motivation
    standard_code: extrinsic_motivation
    ca_id: trm_4a3fd79d0a28c
    definition_text: motivated by external factors, as opposed to the internal drivers
      of intrinsic motivation. Extrinsic motivation drives one to do things for tangible
      rewards or pressures.
  face_perception:
    label: face perception
    standard_code: face_perception
    ca_id: trm_4a3fd79d0a300
    definition_text: The processes by which faces are identified as such.
  face_recognition:
    label: face recognition
    standard_code: face_recognition
    ca_id: trm_4a3fd79d0a30c
    definition_text: The process of determining whether a face is the same as another
      face that has been previously encountered.
    broader:
    - visual_object_recognition
    - recognition
  facial_expression:
    label: facial expression
    standard_code: facial_expression
    ca_id: trm_4a3fd79d0a318
    definition_text: Movements and positions of the facial muscles that can be used
      as a form of nonverbal communication, particularly in conveying emotional states.
  false_memory:
    label: false memory
    standard_code: false_memory
    ca_id: trm_4a3fd79d0a323
    definition_text: a memory that refers to an event that did not actually occur
  feature_extraction:
    label: feature extraction
    standard_code: feature_extraction
    ca_id: trm_4a3fd79d0a32f
    definition_text: Processes by which relevant aspects of a data stream are separated
      from irrelevant aspects.
    part_of:
    - feature_detection
  feedback_processing:
    label: feedback processing
    standard_code: feedback_processing
    ca_id: trm_4a3fd79d0a33b
    definition_text: Evaluative or corrective information about an action, event,
      or process delivered to the original or controlling source, often with the intent
      of modifying future actions.
    part_of:
    - performance_monitoring
    - reinforcement_learning
    synonyms:
    - term: feedback
      weight: 0.7
  filtering:
    label: filtering
    standard_code: filtering
    ca_id: trm_4a3fd79d0a352
    definition_text: a device or process that removes from a signal some unwanted
      component or feature.
  fixation:
    label: fixation
    standard_code: fixation
    ca_id: trm_4a3fd79d0a35e
    definition_text: Maintaining gaze or attention on some object or event. (Experimental
      design) A trial period in which a participant is instructed to direct attention
      toward a visual stimulus (often a cross).
  fixed_action_patterns:
    label: fixed action patterns
    standard_code: fixed_action_patterns
    ca_id: trm_4a3fd79d0a36a
    definition_text: an instinctive  behavioral  sequence that is indivisible and
      runs to completion.
  fluid_intelligence:
    label: fluid intelligence
    standard_code: fluid_intelligence
    ca_id: trm_4a3fd79d0a375
    definition_text: "a factor of general intelligence originally identified by Raymond\
      \ Cattell; Cattell defined fluid intelligence as &#34;â\x80¦the ability to perceive\
      \ relationships independent of previous specific practice or instruction concerning\
      \ those relationships.&#34; Fluid intelligence is the ability to think and reason\
      \ abstractly and solve problems. This ability is considered independent of learning,\
      \ experience, and education."
    synonyms:
    - term: fluid reasoning
      weight: 0.7
  focus:
    label: focus
    standard_code: focus
    ca_id: trm_4a3fd79d0a381
    definition_text: 'The center of attention or concentration. '
  focused_attention:
    label: focused attention
    standard_code: focused_attention
    ca_id: trm_4a3fd79d0a38d
    definition_text: the ability to respond discretely to specific visual, auditory
      or tactile stimuli.
  form_perception:
    label: form perception
    standard_code: form_perception
    ca_id: trm_4a3fd79d0a398
    definition_text: the sensory discrimination of a pattern, shape or outline.
    part_of:
    - object_perception
  functional_fixedness:
    label: functional fixedness
    standard_code: functional_fixedness
    ca_id: trm_4a3fd79d0a3a4
    definition_text: a cognitive bias that limits a person to using an object only
      in the way it is traditionally used.
  gaze:
    label: gaze
    standard_code: gaze
    ca_id: trm_4a3fd79d0a3d2
    definition_text: 'The act of fixating the eyes onto a location.  '
    broader:
    - fixation
  generalization:
    label: generalization
    standard_code: generalization
    ca_id: trm_4a3fd79d0a3ea
    definition_text: The act of transferring knowledge learned from one event to a
      novel event that is similar in some respect.
    broader:
    - inference
  generic_knowledge:
    label: generic knowledge
    standard_code: generic_knowledge
    ca_id: trm_4a3fd79d0a3f6
    definition_text: 'Generic knowledge is knowledge that is applicable not just to
      a single entity but to a class of entities. '
  gestalt:
    label: gestalt
    standard_code: gestalt
    ca_id: trm_4a3fd79d0a402
    definition_text: a collection of physical, biological, psychological or symbolic
      entities that creates a unified concept, configuration or pattern which is greater
      than the sum of its parts (of a character, personality, or being).
  goal:
    label: goal
    standard_code: goal
    ca_id: trm_4a3fd79d0a419
    definition_text: The desired end-point of behavior(s).
  goal_formation:
    label: goal formation
    standard_code: goal_formation
    ca_id: trm_4a3fd79d0a425
    definition_text: The processes that create and maintain representations of goal
      states.
  goal_maintenance:
    label: goal maintenance
    standard_code: goal_maintenance
    ca_id: trm_4a3fd79d0a431
    definition_text: The maintenance of information regarding task goals in working
      memory.
    broader:
    - maintenance
    part_of:
    - selective_control
    - proactive_control
  goal_management:
    label: goal management
    standard_code: goal_management
    ca_id: trm_4a3fd79d0a43c
    definition_text: consists of the process of recognizing or inferring goals, abandoning
      no longer relevant goals, identifying and resolving conflicts among goals, and
      prioritizing goals consistently for optimal success.
  goal_state:
    label: goal state
    standard_code: goal_state
    ca_id: trm_4a3fd79d0a448
    definition_text: 'A point reached when goal directed behavior has successfully
      concluded. '
  gustatory_learning:
    label: gustatory learning
    standard_code: gustatory_learning
    ca_id: trm_4a3fd79d0a460
    definition_text: The formation of a knowledge representation that contains information
      about gustatory percepts.
    broader:
    - gustation_processing
    - learning
  gustatory_memory:
    label: gustatory memory
    standard_code: gustatory_memory
    ca_id: trm_4a3fd79d0a46b
    definition_text: 'the cognitive capacity of storing and retrieving information
      related to taste.  '
  gustatory_perception:
    label: gustatory perception
    standard_code: gustatory_perception
    ca_id: trm_4a3fd79d0a477
    definition_text: The processes involved with representing gustatory sensations
      as such.
  habit:
    label: habit
    standard_code: habit
    ca_id: trm_4a3fd79d0a483
    definition_text: An acquired pattern of behavior that often occurs automatically
      and is reliably triggered by some event or stimulus.
    part_of:
    - reward_learning
  habit_learning:
    label: habit learning
    standard_code: habit_learning
    ca_id: trm_4a3fd79d0a48e
    definition_text: The process of acquiring a habit
    part_of:
    - addiction
  habit_memory:
    label: habit memory
    standard_code: habit_memory
    ca_id: trm_4a3fd79d0a49a
    definition_text: the memory representation of a learned habit, generally thought
      to be represented as a stimulus-response association
  hallucination:
    label: hallucination
    standard_code: hallucination
    ca_id: trm_4a3fd79d0a4a6
    definition_text: "in the broadest sense of the word, is a perception in the absence\
      \ of a stimulus. In a stricter sense, hallucinations are defined as perceptions\
      \ in a conscious and awake state in the absence of external stimuli which have\
      \ qualities of real perception, in that they are vivid, substantial, and located\
      \ in external objective space.\r\n\r\n"
  hedonism:
    label: hedonism
    standard_code: hedonism
    ca_id: trm_4a3fd79d0a4b2
    definition_text: a school which argues that pleasure is the only intrinsic good,
      often used as a justification for evaluating actions in terms of how much pleasure
      and how little pain (i.e. suffering) they produce.
  heuristic_search:
    label: heuristic search
    standard_code: heuristic_search
    ca_id: trm_4a3fd79d0a4be
    definition_text: refers to experience-based techniques for problem solving, learning,
      and discovery. Heuristic methods are used to speed up the process of finding
      a good enough solution, where an exhaustive search is impractical. Examples
      of this method include using a &#34;rule of thumb&#34;, an educated guess, an
      intuitive judgment, or common sense.  In more precise terms, heuristics are
      strategies using readily accessible, though loosely applicable, information
      to control problem solving in human beings and machines
  hill_climbing:
    label: hill climbing
    standard_code: hill_climbing
    ca_id: trm_4a3fd79d0a4c9
    definition_text: A fast but sometimes unreliable optimization method.  When searching
      for the minimum/maximum value of a function a random step is taken; if the value
      improves it replaces the current value, then another random step is taken.
  humiliation:
    label: humiliation
    standard_code: humiliation
    ca_id: trm_4a3fd79d0a4e1
    definition_text: to reduce to a lower position in one&#39;s own eyes or others&#39;
      eyes.
  humor:
    label: humor
    standard_code: humor
    ca_id: trm_4a3fd79d0a4ed
    definition_text: the tendency of particular cognitive experiences to provoke laughter  and
      provide amusement.
  iconic_memory:
    label: iconic memory
    standard_code: iconic_memory
    ca_id: trm_4a3fd79d0a4f9
    definition_text: very brief sensory memory of some visual stimuli, that occur
      in the form of mental pictures.
    broader:
    - visual_memory
  imageability:
    label: imageability
    standard_code: imageability
    ca_id: trm_4a3fd79d0a504
    definition_text: 'is a property of a word or concept reflecting how easy or difficult
      it is to visually or acoustically imagine.  '
    part_of:
    - language
  imagery:
    label: imagery
    standard_code: imagery
    ca_id: trm_4a3fd79d0a510
    definition_text: an experience that, on most occasions, significantly resembles
      the experience of perceiving some object, event, or scene, but occurs when the
      relevant object, event, or scene is not actually present to the senses.
  implicit_knowledge:
    label: implicit knowledge
    standard_code: implicit_knowledge
    ca_id: trm_4a3fd79d0a51c
    definition_text: "knowledge that is kept in a personâ\x80\x99s mind without necessarily\
      \ being expressed in words and is often acted on instinctively."
    broader:
    - knowledge
  implicit_learning:
    label: implicit learning
    standard_code: implicit_learning
    ca_id: trm_4a3fd79d0a527
    definition_text: None
  implicit_memory:
    label: implicit memory
    standard_code: implicit_memory
    ca_id: trm_4a3fd79d0a533
    definition_text: Type of memory in which experiences increases performance of
      task without one&#39;s conscious awareness of these previous experiences. This
      type of memory applies to habit learning, skills, conditioning.
    broader:
    - memory
  imprinting:
    label: imprinting
    standard_code: imprinting
    ca_id: trm_4a3fd79d0a53f
    definition_text: a rapid learning process that takes place early in the life of
      a social animal and establishes a behavior pattern (as recognition of and attraction
      to its own kind or a substitute).
  inattention:
    label: inattention
    standard_code: inattention
    ca_id: trm_4a3fd79d0a54b
    definition_text: The failure to process an external stimulus (often refers to
      sensory stimuli).
  incidental_learning:
    label: incidental learning
    standard_code: incidental_learning
    ca_id: trm_4a3fd79d0a556
    definition_text: Learning without explicit knowledge of doing so, but occurring
      through interaction with the environment (e.g., by observation/copying of behavior
      or response to reinforcement).
    broader:
    - implicit_learning_1
  incubation:
    label: incubation
    standard_code: incubation
    ca_id: trm_4a3fd79d0a562
    definition_text: the process of thinking about a problem subconsciously while
      being involved in other activities
  indignation:
    label: indignation
    standard_code: indignation
    ca_id: trm_4a3fd79d0a56e
    definition_text: anger aroused by something unjust, unworthy, or mean.
  induction:
    label: induction
    standard_code: induction
    ca_id: trm_4a3fd79d0a579
    definition_text: reaching a conclusion from a set of premises that could, but
      do not necessarily, lead to it
    synonyms:
    - term: inductive reasoning
      weight: 0.7
  inductive_reasoning:
    label: inductive reasoning
    standard_code: inductive_reasoning
    ca_id: trm_4a3fd79d0a590
    definition_text: "reasoning from a specific case or cases and deriving a general\
      \ rule, drawing inferences from observations in order to make generalizations.\r\
      \n"
    broader:
    - inference
    - reasoning
    synonyms:
    - term: inductive inference
      weight: 0.7
  inference:
    label: inference
    standard_code: inference
    ca_id: trm_4a3fd79d0a5ed
    definition_text: the act of passing from one proposition, statement, or judgment
      considered as true to another whose truth is believed to follow from that of
      the former; the act of passing from statistical sample data to generalizations
      (as of the value of population parameters) usually with calculated degrees of
      certainty.
    broader:
    - decision_making
  inhibition:
    label: inhibition
    standard_code: inhibition
    ca_id: trm_4a3fd79d0a613
    definition_text: The process by which a response or thought is suppressed.
    broader:
    - cognitive_control
    part_of:
    - task_switching
    - set_shifting
  inhibition_of_return:
    label: inhibition of return
    standard_code: inhibition_of_return
    ca_id: trm_4a3fd79d0a61f
    definition_text: the phenomenon in which the speed and accuracy with which an
      object is detected are first briefly enhanced (for perhaps 100-300 milliseconds)
      after the object is attended, and then detection speed and accuracy are impaired
      (for perhaps 500-3000 milliseconds).
  insight:
    label: insight
    standard_code: insight
    ca_id: trm_4a3fd79d0a62b
    definition_text: In problem solving, the moment at which an underlying relation
      between cause and effect is discovered/identified.
  instinct:
    label: instinct
    standard_code: instinct
    ca_id: trm_4a3fd79d0a637
    definition_text: a natural or inherent aptitude, impulse, or capacity; a largely
      inheritable and unalterable tendency of an organism to make a complex and specific
      response to environmental stimuli without involving reason, behavior that is
      mediated by reactions below the conscious level.
  instrumental_conditioning:
    label: instrumental conditioning
    standard_code: instrumental_conditioning
    ca_id: trm_4a3fd79d0a642
    definition_text: a learning process in which the consequences of an action are
      used to modify aspects of that action thereafter; these aspects include form
      and frequency (including the likelihood of reoccurrence at all).
    synonyms:
    - term: instrumental learning
      weight: 0.7
    - term: operant conditioning
      weight: 0.7
  instrumental_learning:
    label: instrumental learning
    standard_code: instrumental_learning
    ca_id: trm_4a3fd79d0a64e
    definition_text: learning based on reward; a form of learning that takes place
      as a direct consequence of a reward or pleasant outcome for the learner.
  integration:
    label: integration
    standard_code: integration
    ca_id: trm_4a3fd79d0a65a
    definition_text: coordination of mental processes into a normal effective personality
      or with the individual&#39;s environment
  intelligence:
    label: intelligence
    standard_code: intelligence
    ca_id: trm_4a3fd79d0a666
    definition_text: the ability to learn or understand or to deal with new or trying
      situations; the skilled use of reason; the ability to apply knowledge to manipulate
      one&#39;s environment or to think abstractly as measured by objective criteria
  intention:
    label: intention
    standard_code: intention
    ca_id: trm_4a3fd79d0a67d
    definition_text: an act or instance of determining mentally upon some action or
      result; meaning or significance.
  intentional_forgetting:
    label: intentional forgetting
    standard_code: intentional_forgetting
    ca_id: trm_4a3fd79d0a689
    definition_text: the purposeful forgetting of information that is no longer needed.
    broader:
    - forgetting
  intentional_learning:
    label: intentional learning
    standard_code: intentional_learning
    ca_id: trm_4a3fd79d0a695
    definition_text: learning that is motivated  with intention and is usually goal
      directed.
    broader:
    - explicit_learning
  intentionality:
    label: intentionality
    standard_code: intentionality
    ca_id: trm_4a3fd79d0a6a1
    definition_text: 'the state of having or being formed by an intention; (philosophy)
      the property of being about or directed toward a subject, as inherent in conscious
      states, beliefs, or creations of the mind, such as sentences or books. '
  interference:
    label: interference
    standard_code: interference
    ca_id: trm_4a3fd79d0a6ad
    definition_text: the disturbing effect of new information on the other information
      with which it is inconsistent
  intermediate_term_memory:
    label: intermediate-term memory
    standard_code: intermediate_term_memory
    ca_id: trm_4a3fd79d0a6b9
    definition_text: a specialized term referring for information about a current
      task.
    broader:
    - memory
    synonyms:
    - term: ITM
      weight: 0.7
  internal_speech:
    label: internal speech
    standard_code: internal_speech
    ca_id: trm_4a3fd79d0a6c5
    definition_text: "also known as inner voice, internal speech, or verbal stream\
      \ of consciousness is thinking in words. It also refers to the semi-constant\
      \ internal monologue one has with oneself at a conscious or semi-conscious level.\r\
      \n\r\n"
  interrogative:
    label: interrogative
    standard_code: interrogative
    ca_id: trm_4a3fd79d0a6d0
    definition_text: of, pertaining to, or conveying a question.
  intonation:
    label: intonation
    standard_code: intonation
    ca_id: trm_4a3fd79d0a6dc
    definition_text: the ability to play or sing notes in tune; manner of utterance,
      specifically the rise and fall in pitch of the voice in speech.
  intrinsic_motivation:
    label: intrinsic motivation
    standard_code: intrinsic_motivation
    ca_id: trm_4a3fd79d0a6e8
    definition_text: a highly desired form of incentive that stems from a person&#39;s
      internal desire for self-satisfaction or pleasure in performing the task itself.
  introspection:
    label: introspection
    standard_code: introspection
    ca_id: trm_4a3fd79d0a6f4
    definition_text: the self-observation and reporting of conscious inner thoughts,
      desires  and sensations. It is a conscious mental and usually purposive process
      relying on thinking, reasoning, and examining one&#39;s own thoughts, feelings.
  involuntary_attention:
    label: involuntary attention
    standard_code: involuntary_attention
    ca_id: trm_4a3fd79d0a700
    definition_text: results when the conscious mind changes focus to sudden changes
      in the environment (big sound, intensity of light, unique situation etc.).  The
      person is not prepared for the attention and the attention is not under control
      of the individual.  The persons attention is less concerned with motives, interests,
      and needs and the stimulus is usually more important than any functional factors.
  irony:
    label: irony
    standard_code: irony
    ca_id: trm_4a3fd79d0a70b
    definition_text: a situation, literary technique, or rhetorical device, in which
      there is an incongruity or discordance that goes strikingly beyond the most
      simple and evident meaning of words or actions.
  judgment:
    label: judgment
    standard_code: judgment
    ca_id: trm_4a3fd79d0a723
    definition_text: the process of forming an opinion or evaluation by discerning
      and comparing
    part_of:
    - categorical_perception
    - difference_threshold
  kinaesthetic_representation:
    label: kinaesthetic representation
    standard_code: kinaesthetic_representation
    ca_id: trm_4a3fd79d0a72e
    definition_text: "is a representation of sensory inputs from muscles, tendons,\
      \ and joints (e.g.,the joint angles used to reach a point in space).\r\n\r\n"
    broader:
    - body_representation
    part_of:
    - kinesthesia
    synonyms:
    - term: kinesthetic representation
      weight: 0.7
  kinesthesia:
    label: kinesthesia
    standard_code: kinesthesia
    ca_id: trm_4a3fd79d0a73a
    definition_text: 'a sense mediated by receptors located in muscles, tendons, and
      joints and stimulated by bodily movements and tensions. '
    broader:
    - somatosensation
    synonyms:
    - term: kinaesthesia
      weight: 0.7
  knowledge:
    label: knowledge
    standard_code: knowledge
    ca_id: trm_4a3fd79d0a746
    definition_text: information acquired and represented by a person through experience
      or education
  language:
    label: language
    standard_code: language
    ca_id: trm_4a3fd79d0a769
    definition_text: The mental ability to encode and decode information, and translate
      this information into verbal, acoustic and visual representations, according
      to a set of rules that are common across a population.
    part_of:
    - cognitive_development
  language_comprehension:
    label: language comprehension
    standard_code: language_comprehension
    ca_id: trm_4a3fd79d0a775
    definition_text: The ability to understand communication from others, such as
      speech, written text, gestures, or sign language.
    broader:
    - language_processing
  language_learning:
    label: language learning
    standard_code: language_learning
    ca_id: trm_4a3fd79d0a781
    definition_text: the process by which humans acquire the capacity to perceive,
      produce and use words to understand and communicate, this capacity involves
      the picking up of diverse capacities including syntax, phonetics, and an extensive
      vocabulary, the language might be vocal as with speech or manual as in sign.
    broader:
    - explicit_learning
    part_of:
    - language
  language_production:
    label: language production
    standard_code: language_production
    ca_id: trm_4a3fd79d0a78d
    definition_text: is translating a concept or set of ideas into spoken, signed
      or written form
    part_of:
    - language
  learning:
    label: learning
    standard_code: learning
    ca_id: trm_4a3fd79d0a7bb
    definition_text: 'The process of acquiring new skills/knowledge/information '
  lemma:
    label: lemma
    standard_code: lemma
    ca_id: trm_4a3fd79d0a7c7
    definition_text: an abstract form of a word before any phonological assignment,
      arising early in speech production
  lexical_encoding:
    label: lexical encoding
    standard_code: lexical_encoding
    ca_id: trm_4a3fd79d0a7d4
    definition_text: "converting vocabulary, words, or morphemes of a language into\
      \ a code.\r\n"
    broader:
    - encoding
  lexical_retrieval:
    label: lexical retrieval
    standard_code: lexical_retrieval
    ca_id: trm_4a3fd79d0a7e0
    definition_text: retrieval of a lexical entry
    broader:
    - retrieval
    - lexical_processing
  lexicon:
    label: lexicon
    standard_code: lexicon
    ca_id: trm_4a3fd79d0a7ec
    definition_text: The vocabulary of a language, including its words and expressions.
    part_of:
    - language
    synonyms:
    - term: vocabulary
      weight: 0.7
  linguistic_competence:
    label: linguistic competence
    standard_code: linguistic_competence
    ca_id: trm_4a3fd79d0a7f8
    definition_text: a speaker&#39;s implicit, internalized knowledge of the rules
      of their language.
  listening:
    label: listening
    standard_code: listening
    ca_id: trm_4a3fd79d0a803
    definition_text: to pay attention to sound; to hear something with thoughtful
      attention, give consideration; to be alert to catch an expected sound.
    broader:
    - auditory_attention
  logic:
    label: logic
    standard_code: logic
    ca_id: trm_4a3fd79d0a80f
    definition_text: a science that deals with the principles and criteria of validity
      of inference and demonstration; the science of the formal principles of reasoning.
  logical_reasoning:
    label: logical reasoning
    standard_code: logical_reasoning
    ca_id: trm_4a3fd79d0a81b
    definition_text: 'The strategy when  one uses deduction, induction, or abduction
      to evaluate preconditions and rules to determnie a conclusion.  '
    broader:
    - reasoning
  long_term_memory:
    label: long-term memory
    standard_code: long_term_memory
    ca_id: trm_4a3fd79d0a833
    definition_text: a system for permanently storing, managing, and retrieving information
      for later use, items of information stored as long-term memory may be available
      for a lifetime.
    broader:
    - memory
    synonyms:
    - term: LTM
      weight: 0.7
  loss_aversion:
    label: loss aversion
    standard_code: loss_aversion
    ca_id: trm_4a3fd79d0a83f
    definition_text: The tendency of individuals to be more sensitive to the possibility
      of losing objects or money than they are to the possibility of gaining the same
      objects or amounts of money.
  lying:
    label: lying
    standard_code: lying
    ca_id: trm_4a3fd79d0a84a
    definition_text: the expression of a falsehood
  mathematical_reasoning:
    label: mathematical reasoning
    standard_code: mathematical_reasoning
    ca_id: trm_4a3fd79d0a862
    definition_text: Reasoning about mathematical objects
    broader:
    - reasoning
  meaning:
    label: meaning
    standard_code: meaning
    ca_id: trm_4a3fd79d0a86e
    definition_text: the connotation of a word or phrase
  mechanical_reasoning:
    label: mechanical reasoning
    standard_code: mechanical_reasoning
    ca_id: trm_4a3fd79d0a87a
    definition_text: Reasoning about mechanical objects or functions
    broader:
    - reasoning
  melody:
    label: melody
    standard_code: melody
    ca_id: trm_4a3fd79d0a886
    definition_text: a linear succession of musical tones which is perceived as a
      single entity.
    synonyms:
    - term: tune
      weight: 0.7
  memory:
    label: memory
    standard_code: memory
    ca_id: trm_4a3fd79d0a891
    definition_text: "The ability of an organism to use past events to inform/influence\
      \ current actions\r\n"
  mental_arithmetic:
    label: mental arithmetic
    standard_code: mental_arithmetic
    ca_id: trm_4a3fd79d0a8ed
    definition_text: mathematical calculations done mentally, without writing them
      down.
  mental_imagery:
    label: mental imagery
    standard_code: mental_imagery
    ca_id: trm_4a3fd79d0a8fc
    definition_text: is an experience that, on most occasions, significantly resembles
      the experience of perceiving (through any of the senses) of some object, event,
      or scene, but occurs when the relevant object, event, or scene is not actually
      present to the senses.
    broader:
    - imagination
  mental_representation:
    label: mental representation
    standard_code: mental_representation
    ca_id: trm_4a3fd79d0a908
    definition_text: a presentation to the mind in the form of an idea or image.
  mental_rotation:
    label: mental rotation
    standard_code: mental_rotation
    ca_id: trm_4a3fd79d0a914
    definition_text: Ability to rotate an object in one&#39;s mind; ability to make
      perceptual judgments on a new spatial configuration of an object.
  metacognition:
    label: metacognition
    standard_code: metacognition
    ca_id: trm_4a3fd79d0a920
    definition_text: awareness or analysis of one&#39;s own learning or thinking processes.
  metacognitive_skill:
    label: metacognitive skill
    standard_code: metacognitive_skill
    ca_id: trm_4a3fd79d0a92b
    definition_text: "a learners&#39; automatic awareness of their own knowledge and\
      \ their ability to understand, control, and manipulate their own cognitive processes.\r\
      \n"
  metaphor:
    label: metaphor
    standard_code: metaphor
    ca_id: trm_4a3fd79d0a937
    definition_text: a figure of speech in which a word or phrase literally denoting
      one kind of object or idea is used in place of another to suggest a likeness
      or analogy between them.
  misattribution:
    label: misattribution
    standard_code: misattribution
    ca_id: trm_4a3fd79d0a943
    definition_text: attributing an event to something with which it has no connection
      or association.
  monitoring:
    label: monitoring
    standard_code: monitoring
    ca_id: trm_4a3fd79d0a94f
    definition_text: the act of checking for particular kinds of information
  mood:
    label: mood
    standard_code: mood
    ca_id: trm_4a3fd79d0a95a
    definition_text: a conscious state of mind or predominant emotion.
  motor_control:
    label: motor control
    standard_code: motor_control
    ca_id: trm_4a3fd79d0a972
    definition_text: The function of supervising motor activities
  motor_learning:
    label: motor learning
    standard_code: motor_learning
    ca_id: trm_4a3fd79d0a995
    definition_text: the process of improving motor skills, the smoothness and accuracy
      of movements.
  motor_planning:
    label: motor planning
    standard_code: motor_planning
    ca_id: trm_4a3fd79d0a9a1
    definition_text: "the conception of a future motoric action\r\n"
    part_of:
    - action
    synonyms:
    - term: movement planning
      weight: 0.7
  motor_program:
    label: motor program
    standard_code: motor_program
    ca_id: trm_4a3fd79d0a9ad
    definition_text: abstract representation of a movement
  motor_sequence_learning:
    label: motor sequence learning
    standard_code: motor_sequence_learning
    ca_id: trm_4a3fd79d0a9b9
    definition_text: The acquisition of knowledge regarding sequences of motor action
    broader:
    - sequence_learning
  movement:
    label: movement
    standard_code: movement
    ca_id: trm_4a3fd79d0a9c4
    definition_text: change of place or position or posture
  naming:
    label: naming
    standard_code: naming
    ca_id: trm_4a3fd79d0a9dc
    definition_text: the expression of the name of an object
  narrative:
    label: narrative
    standard_code: narrative
    ca_id: trm_4a3fd79d0a9e8
    definition_text: a story that is created in a constructive format (as a work of
      writing, speech, poetry, prose, pictures, song, motion pictures, video games,
      theater or dance) that describes a sequence of fictional or non-fictional events.
  navigation:
    label: navigation
    standard_code: navigation
    ca_id: trm_4a3fd79d0aa00
    definition_text: The process of controlling the movement of a body/entity/vehicle
      through space from one point to another.
  nociception:
    label: nociception
    standard_code: nociception
    ca_id: trm_4a3fd79d0aa0c
    definition_text: the processes of encoding and processing noxious stimuli.
    broader:
    - interoception
    - somatosensation
  nondeclarative_knowledge:
    label: nondeclarative knowledge
    standard_code: nondeclarative_knowledge
    ca_id: trm_4a3fd79d0aa23
    definition_text: The nonconscious or implicit ability to express and practice
      learned information.
  nondeclarative_memory:
    label: nondeclarative memory
    standard_code: nondeclarative_memory
    ca_id: trm_4a3fd79d0aa2f
    definition_text: Memory acquired through experience and which can not be consciously
      articulated (such as by recall or recognition). This type of memory includes
      priming, conditioning, skill-acquisition, and habits.
    broader:
    - long_term_memory
  novelty_detection:
    label: novelty detection
    standard_code: novelty_detection
    ca_id: trm_4a3fd79d0aa47
    definition_text: the identification of new or unknown information
    broader:
    - oddball_detection
  object_categorization:
    label: object categorization
    standard_code: object_categorization
    ca_id: trm_4a3fd79d0aa5e
    definition_text: the assignment of an object to a particular category
  object_centered_representation:
    label: object centered representation
    standard_code: object_centered_representation
    ca_id: trm_4a3fd79d0aa6a
    definition_text: "In an object-centered representation, the position of the subparts\
      \ of an object are encoded with respect to a set of axes and an origin centered\
      \ on the object. Several physiological and neuropsychological results support\
      \ the existence of such representations in humans and monkeys. An explicit representation\
      \ would involve neurons with invariant response properties in object-centered\
      \ coordinates.\r\n"
    broader:
    - mental_representation
    part_of:
    - object_recognition
  object_detection:
    label: object detection
    standard_code: object_detection
    ca_id: trm_4a3fd79d0aa76
    definition_text: deals with detecting instances of semantic objects of a certain
      class (such as humans, buildings, cars, etc.).
    broader:
    - stimulus_detection
  object_manipulation:
    label: object manipulation
    standard_code: object_manipulation
    ca_id: trm_4a3fd79d0aa8d
    definition_text: is a form of dexterity play or performance in which one or more
      artists physically interact with props such as balls, hoops, rings, poi, staff,
      devil sticks, or clubs. Object manipulation can be considered an advanced combinatorial
      form of sports, dance, and games.
  object_perception:
    label: object perception
    standard_code: object_perception
    ca_id: trm_4a3fd79d0aaa4
    definition_text: The process of transforming basic visual sensory input (such
      as contrast, edge, motion, color etc) into a more abstract and semantically
      identifiable whole.
    broader:
    - perception
  object_recognition:
    label: object recognition
    standard_code: object_recognition
    ca_id: trm_4a3fd79d0aab0
    definition_text: "is the ability to perceive an objectâ\x80\x99s physical properties\
      \ (such as shape, colour and texture) and apply semantic attributes to the object,\
      \ which includes the understanding of its use, previous experience with the\
      \ object and how it relates to others.\r\n"
    broader:
    - recognition
    synonyms:
    - term: object identification
      weight: 0.7
  olfaction:
    label: olfaction
    standard_code: olfaction
    ca_id: trm_4a3fd79d0aabc
    definition_text: the sense of smell; the act or process of smelling.
    part_of:
    - perception
  olfactory_perception:
    label: olfactory perception
    standard_code: olfactory_perception
    ca_id: trm_4a3fd79d0aac8
    definition_text: 'the sensation that results when olfactory receptors in the nose
      are stimulated by particular chemicals in gaseous form. '
    broader:
    - perception
  orthographic_lexicon:
    label: orthographic lexicon
    standard_code: orthographic_lexicon
    ca_id: trm_4a3fd79d0aad4
    definition_text: A set of representations of orthographic information
    broader:
    - lexicon
  parsing:
    label: parsing
    standard_code: parsing
    ca_id: trm_4a3fd79d0ab42
    definition_text: to resolve (as a sentence) into component parts of speech and
      describe them grammatically
  passive_attention:
    label: passive attention
    standard_code: passive_attention
    ca_id: trm_4a3fd79d0ab4d
    definition_text: "refers to the involuntary process directed by external events\
      \ that stand out from their environment, such as a bright flash, a strong odor,\
      \ or a sudden loud noise.\r\n"
    broader:
    - attention
  past_tense:
    label: past tense
    standard_code: past_tense
    ca_id: trm_4a3fd79d0ab59
    definition_text: 'refers to a form of a verb that indicates that the action already
      has occurred '
    part_of:
    - language
  pattern_recognition:
    label: pattern recognition
    standard_code: pattern_recognition
    ca_id: trm_4a3fd79d0ab65
    definition_text: The process of identifying a meaningful pattern in raw data.
    broader:
    - recognition
  pavlovian_conditioning:
    label: pavlovian conditioning
    standard_code: pavlovian_conditioning
    ca_id: trm_4a3fd79d0ab70
    definition_text: a form of learning in which a stimulus (designated the &#34;conditional
      stimulus&#34; or CS and being one without inherent significance) is paired with
      an unconditional stimulus or US, so named because it is biologically significant
      (e.g. food, sex, drug, pain), until the participant responds to the former in
      a way that conveys its association of the two. Importantly, participant response
      may be different between the US and its paired CS.
    broader:
    - association_learning
    part_of:
    - spontaneous_recovery
    synonyms:
    - term: classical conditioning
      weight: 0.7
    - term: respondent conditioning
      weight: 0.7
  perception:
    label: perception
    standard_code: perception
    ca_id: trm_4a3fd79d0ab7c
    definition_text: the conscious experience or mental registration of a sensory
      stimulus
  perceptual_binding:
    label: perceptual binding
    standard_code: perceptual_binding
    ca_id: trm_4a3fd79d0ab88
    definition_text: "is the cognitive ability to couple characteristics between items\
      \ that one is perceiving.  This can be illustrated by the one observing a blue\
      \ square and a yellow circle.  Through the neural mechanisms of perceptual binding,\
      \ one can ensure that the sensing of blue is coupled to that of a square shape\
      \ and that of yellow is coupled to that of a circle.\r\n"
  perceptual_categorization:
    label: perceptual categorization
    standard_code: perceptual_categorization
    ca_id: trm_4a3fd79d0ab93
    definition_text: "A selective system that can have no a priori information about\
      \ the particular stimuli that might be encountered in its environment, other\
      \ than boundary conditions implicit in the construction of its recognizing elements.\
      \ Perceptual categorization, according to this view, does not involve the &#34;reading\
      \ in&#34; of readily available information about the stimulus category; rather,\
      \ it involves the utilization of multiple cues in degenerate, overlapping sets\
      \ and under the influence of context.  \r\n"
  perceptual_fluency:
    label: perceptual fluency
    standard_code: perceptual_fluency
    ca_id: trm_4a3fd79d0ab9f
    definition_text: "is the ease at which the brain can process information.\r\n"
  perceptual_identification:
    label: perceptual identification
    standard_code: perceptual_identification
    ca_id: trm_4a3fd79d0abaa
    definition_text: "has two different processing stages.  The first stage yields\
      \ a state of of perceptual information about the stimulus presented.  The second\
      \ stage is the processing of attained perceptual information in a response.\
      \ \r\n"
    part_of:
    - auditory_perception
    - visual_perception
  perceptual_learning:
    label: perceptual learning
    standard_code: perceptual_learning
    ca_id: trm_4a3fd79d0abb6
    definition_text: long lasting improvement in performing perceptual  (visual, auditory,
      tactile, olfactory or taste) tasks as a function of experience.
    broader:
    - implicit_learning_1
    - implicit_learning
    part_of:
    - auditory_perception
    - visual_perception
  perceptual_similarity:
    label: perceptual similarity
    standard_code: perceptual_similarity
    ca_id: trm_4a3fd79d0abc1
    definition_text: 'Perceptual similarity is the subjective similarity between two
      stimuli as perceived by the observer. Thus, object A may be rated as more similar
      to object B than to object C despite a greater difference in some physical metric
      (such as height or width) between objects A and C than between objects A and
      B. This may differ across modalities: for example, two objects may be rated
      as more similar when seen than when touched. However, the physical, objective
      similarity between the two objects remains the same regardless of which modality
      is used to explore them.'
  perceptual_skill:
    label: perceptual skill
    standard_code: perceptual_skill
    ca_id: trm_4a3fd79d0abcd
    definition_text: The ability to observe and understand the events surrounding
      an individual.
  performance_monitoring:
    label: performance monitoring
    standard_code: performance_monitoring
    ca_id: trm_4a3fd79d0ac30
    definition_text: the online evaluation of one&#39;s performance on a task
    broader:
    - cognitive_control
    part_of:
    - action
  phonation:
    label: phonation
    standard_code: phonation
    ca_id: trm_4a3fd79d0ac4a
    definition_text: process by which the vocal folds produce certain sounds through
      quasi-periodic vibration; any oscillatory state of any part of the larynx that
      modifies the airstream.
  phonological_buffer:
    label: phonological buffer
    standard_code: phonological_buffer
    ca_id: trm_4a3fd79d0ac61
    definition_text: a passive storage device that is part of the articulatory rehearsal
      loop; serves as a part of the mechanisms ordinarily needed for hearing.  In
      rehearsal, the buffer is loaded by means of subvocalization.
    part_of:
    - auditory_working_memory
  phonological_code:
    label: phonological code
    standard_code: phonological_code
    ca_id: trm_4a3fd79d0ac7a
    definition_text: A representation of information using phonological features
  phonological_encoding:
    label: phonological encoding
    standard_code: phonological_encoding
    ca_id: trm_4a3fd79d0ac87
    definition_text: "involves retrieval of segmental and supra-segmental information\
      \ and the generation of a syllabified phonological word, and the computation\
      \ of the phonetic form of the intended utterance, referred to as phonetic encoding.\r\
      \n\r\n"
    broader:
    - encoding
    part_of:
    - auditory_coding
  phonological_retrieval:
    label: phonological retrieval
    standard_code: phonological_retrieval
    ca_id: trm_4a3fd79d0ac93
    definition_text: The retrieval of phonological representations based on other
      cues
    broader:
    - retrieval
  phonological_working_memory:
    label: phonological working memory
    standard_code: phonological_working_memory
    ca_id: trm_4a3fd79d0ac9e
    definition_text: The process of maintaining sound information online for a limited
      amount of time.
    broader:
    - working_memory
    - phonological_processing
  planning:
    label: planning
    standard_code: planning
    ca_id: trm_4a3fd79d0acc1
    definition_text: formulation, evaluation and selection of a sequence of actions
      to achieve a desired goal.
  pragmatic_inference:
    label: pragmatic inference
    standard_code: pragmatic_inference
    ca_id: trm_4a3fd79d0ad12
    definition_text: 'Inferences are made when a person (or machine) goes beyond available
      evidence to form a conclusion. A pragmatic inference (also known as an inductive
      inference) is one which is likely to be true because of the state of the world.
      Unlike deductive inferences, pragmatic (inductive) inferences do yield conclusions
      that increase the semantic information over and above that found in the initial
      premises. '
    broader:
    - inference
  pragmatic_knowledge:
    label: pragmatic knowledge
    standard_code: pragmatic_knowledge
    ca_id: trm_4a3fd79d0ad1d
    definition_text: 'is how individuals communicate meaning and how they produce
      contextually appropriate utterances, sentences, or texts.  Pragmatic knowledge
      includes sociolinguistic and functional knowledge.  '
    broader:
    - knowledge
  pragmatic_reasoning:
    label: pragmatic reasoning
    standard_code: pragmatic_reasoning
    ca_id: trm_4a3fd79d0ad29
    definition_text: Pragmatic reasoning is defined as the process of finding the
      intended meaning(s) of the given, and it is suggested that this amounts to the
      process of inferring the appropriate context(s) in which to interpret the given.
    broader:
    - reasoning
  preattentive_processing:
    label: preattentive processing
    standard_code: preattentive_processing
    ca_id: trm_4a3fd79d0ad41
    definition_text: background activity that necessarily precedes conscious mental
      activity; major purpose is the preparation of sensory input for use in focal-attentive
      processes including encoding of the basic properties of sensory input.
  preconscious_perception:
    label: preconscious perception
    standard_code: preconscious_perception
    ca_id: trm_4a3fd79d0ad4c
    definition_text: "is the subthreshold process of visual perception. \r\n\r\n"
    part_of:
    - subconscious
  prejudice:
    label: prejudice
    standard_code: prejudice
    ca_id: trm_4a3fd79d0ad64
    definition_text: preconceived judgment or opinion; an adverse opinion or leaning
      formed without just grounds or before sufficient knowledge; an irrational attitude
      of hostility directed against an individual, a group, a race, or their supposed
      characteristics.
  primary_memory:
    label: primary memory
    standard_code: primary_memory
    ca_id: trm_4a3fd79d0ad94
    definition_text: the temporary maintenance system for conscious processing of
      information.
    broader:
    - memory
  proactive_interference:
    label: proactive interference
    standard_code: proactive_interference
    ca_id: trm_4a3fd79d0adab
    definition_text: "the forgetting of information due to interference from the traces\
      \ of events or learning that occurred prior to the materials to be remembered;\
      \ occurs when in any given context, past memories inhibit an individualâ\x80\
      \x99s full potential to retain new memories."
  problem_solving:
    label: problem solving
    standard_code: problem_solving
    ca_id: trm_4a3fd79d0adb7
    definition_text: Broadly, the mental processes involved in finding a solution
      to a problem.
    broader:
    - reasoning
  procedural_knowledge:
    label: procedural knowledge
    standard_code: procedural_knowledge
    ca_id: trm_4a3fd79d0adc3
    definition_text: Knowledge exercised in the performance of a task/activity. Its
      acquisition or structure is often unavailable to the actor.
    broader:
    - knowledge
  procedural_learning:
    label: procedural learning
    standard_code: procedural_learning
    ca_id: trm_4a3fd79d0adcf
    definition_text: The acquisition of a skill or ability through practice which
      is not accessible to verbalization or conscious awareness.
    broader:
    - implicit_learning_1
  procedural_memory:
    label: procedural memory
    standard_code: procedural_memory
    ca_id: trm_4a3fd79d0addc
    definition_text: memory for how to do things; procedural memories are automatically
      retrieved and utilized for the execution of the step-by-step procedures involved
      in both cognitive and motor skills.
    broader:
    - nondeclarative_memory
  procedural_rule:
    label: procedural rule
    standard_code: procedural_rule
    ca_id: trm_4a3fd79d0ade8
    definition_text: No definition submitted yet
  processing_capacity:
    label: processing capacity
    standard_code: processing_capacity
    ca_id: trm_4a3fd79d0adf4
    definition_text: No definition submitted yet
    part_of:
    - fluid_intelligence
  processing_stage:
    label: processing stage
    standard_code: processing_stage
    ca_id: trm_4a3fd79d0ae00
    definition_text: A subset of mental operations that are confined some feature
      space of information within a stream and/or hierarchy of mental operations.
  pronunciation:
    label: pronunciation
    standard_code: pronunciation
    ca_id: trm_4a3fd79d0ae17
    definition_text: the way a word or a language is spoken, or the manner in which
      someone utters a word.
  proper_noun:
    label: proper noun
    standard_code: proper_noun
    ca_id: trm_4a3fd79d0ae2b
    definition_text: A subject that usually indicates a particular person, place,
      or object.
  proprioception:
    label: proprioception
    standard_code: proprioception
    ca_id: trm_4a3fd79d0ae3d
    definition_text: the sense of the relative position of neighboring parts of the
      body.
    broader:
    - somatosensation
  prosodic_stress:
    label: prosodic stress
    standard_code: prosodic_stress
    ca_id: trm_4a3fd79d0ae58
    definition_text: 'the stress and intonation patterns of an utterance. '
  prosody:
    label: prosody
    standard_code: prosody
    ca_id: trm_4a3fd79d0ae64
    definition_text: the rhythm, stress, and intonation of speech.
  prospective_memory:
    label: prospective memory
    standard_code: prospective_memory
    ca_id: trm_4a3fd79d0ae70
    definition_text: remembering to perform an intended action...prospective memory
      is self-initiated and does not operate directly on external stimuli.
    broader:
    - memory
  prospective_planning:
    label: prospective planning
    standard_code: prospective_planning
    ca_id: trm_4a3fd79d0ae7b
    definition_text: No definition submitted yet
    broader:
    - planning
  prototype:
    label: prototype
    standard_code: prototype
    ca_id: trm_4a3fd79d0ae87
    definition_text: A most common, standard or basic mental representation of some
      category.
    broader:
    - mental_representation
  quantitative_skill:
    label: quantitative skill
    standard_code: quantitative_skill
    ca_id: trm_4a3fd79d0aeaa
    definition_text: "the ability to to use mathematical concepts to solve problems.\
      \  \r\n"
    broader:
    - skill
  reading:
    label: reading
    standard_code: reading
    ca_id: trm_4a3fd79d0aeb6
    definition_text: Decoding symbols to derive their meaning.
    broader:
    - visual_object_recognition
    part_of:
    - language_processing
  reasoning:
    label: reasoning
    standard_code: reasoning
    ca_id: trm_4a3fd79d0aec1
    definition_text: drawing of inferences or conclusions through the use of reason.
    broader:
    - decision_making
  regret:
    label: regret
    standard_code: regret
    ca_id: trm_4a3fd79d0aecd
    definition_text: an emotional response to remembrance of a past state, condition,
      or experience that one wishes had been different
  relational_learning:
    label: relational learning
    standard_code: relational_learning
    ca_id: trm_4a3fd79d0aed8
    definition_text: learning to differentiate among stimuli on the basis of relational
      properties (e.g., the larger of two stimuli) rather than absolute properties
      (e.g., the stimulus that has a given size).
    broader:
    - explicit_learning
  remote_memory:
    label: remote memory
    standard_code: remote_memory
    ca_id: trm_4a3fd79d0aee4
    definition_text: memory for events of long ago as opposed to recent events.
    broader:
    - declarative_memory
  repressed_memory:
    label: repressed memory
    standard_code: repressed_memory
    ca_id: trm_4a3fd79d0aeef
    definition_text: A memory (often traumatic) that is unavailable for recall.
    broader:
    - memory
  resource_limit:
    label: resource limit
    standard_code: resource_limit
    ca_id: trm_4a3fd79d0af4c
    definition_text: the maximum amount of cognitive resources that can be allocated
      to various, often competing tasks
  resource_sharing:
    label: resource sharing
    standard_code: resource_sharing
    ca_id: trm_4a3fd79d0af5a
    definition_text: "is a unique characteristic of humans and several primates that\
      \ involve sharing resources such as food, shelter, etc., as a collective risk-reduction\
      \ against variability in resource supply.\r\n"
  response_inhibition:
    label: response inhibition
    standard_code: response_inhibition
    ca_id: trm_4a3fd79d0af66
    definition_text: Suppression of actions that are inappropriate in a given context
      and that interfere with goal-driven behavior.
    broader:
    - inhibition
    synonyms:
    - term: motor inhibition
      weight: 0.7
  response_selection:
    label: response selection
    standard_code: response_selection
    ca_id: trm_4a3fd79d0af71
    definition_text: The selection of one action from a limited set of possible actions.
    part_of:
    - decision_making
    - action
    synonyms:
    - term: action selection
      weight: 0.7
    - term: motor execution
      weight: 0.7
  retention:
    label: retention
    standard_code: retention
    ca_id: trm_4a3fd79d0af7d
    definition_text: "a preservation of the aftereffects of experience and learning\
      \ that makes recall or recognition possible.\r\nPersistence of learned behavior\
      \ or experience during a period when it is not being performed o r practiced.\r\
      \nRetention is the second stage of memory after encoding and before retrival"
    broader:
    - encoding
    part_of:
    - memory
  retrieval:
    label: retrieval
    standard_code: retrieval
    ca_id: trm_4a3fd79d0af94
    definition_text: "The process of accessing information from memory or other storage\
      \ devices; the possibility of recovery, restoration, or rectification.\r\nRetrieval\
      \ is the third stage of memory after encoding and retention."
    part_of:
    - memory
  retrieval_cue:
    label: retrieval cue
    standard_code: retrieval_cue
    ca_id: trm_4a3fd79d0afa0
    definition_text: An event or experience that facilitates retrieval of information
      from long-term memory because of its association to that information.
  retroactive_interference:
    label: retroactive interference
    standard_code: retroactive_interference
    ca_id: trm_4a3fd79d0afab
    definition_text: impeded retrieval and performance of previously learnt information
      due to newly acquired and practiced information.
    broader:
    - interference
    synonyms:
    - term: retroactive inhibition
      weight: 0.7
  rhythm:
    label: rhythm
    standard_code: rhythm
    ca_id: trm_4a3fd79d0afc3
    definition_text: Movement marked by the regulated succession of strong and weak
      elements, or of opposite or different conditions.  While rhythm most commonly
      applies to sound, such as music and spoken language, it may also refer to visual
      presentation, as timed movement through space.
  risk:
    label: risk
    standard_code: risk
    ca_id: trm_4a3fd79d0afcf
    definition_text: "Formally and mathematically speaking, the minimal definition\
      \ of risk is what (Rothschild and Stiglitz, 1970) call a mean-preserving increase\
      \ in dispersion. A typical example is a gamble offering $400 or $600 based on\
      \ the outcome of a coin flip (i.e. with equal probability (50%)); this is less\
      \ risky as compared to a similar gamble offering $200 or $800 [again depending\
      \ on the outcome of a coin flip]. Notice here that the mean outcome (or â\x80\
      \x9Cexpected valueâ\x80\x9D) remains the same for both gambles.\r\n\r\nThus\
      \ risk can increase by keeping both the probabilities and the expected value\
      \ the same. \r\n\r\nThere are other approaches to risk that are less mathematically\
      \ stringent but have higher ecological validity. For instance increasing the\
      \ probability of a (positive outcome) is associated with a reduced perception\
      \ of risk. Notice though now that the expected value (or the mean outcome) also\
      \ increases. So, it is difficult in that case to disentangle the two metrics.\r\
      \n\r\nMany times  the term risk is associated with the probability of a negative\
      \ outcome, or what is formally called downside risk. This idea is mostly due\
      \ to the way actuarial science and insurance companies (which are more interested\
      \ in the negative aspects of risk) use the term. For instance, the statement,\
      \ â\x80\x9Cnow we increase the risk,â\x80\x9D might be translated as taking\
      \ more perilous actions, but formally, this is not the case. The point of risk\
      \ is that the opportunity also increases (â\x80\x9Cupsideâ\x80\x9D risk). Thus,\
      \ a situation that is riskier can be attractive, especially if the agent focuses\
      \ on the positive outcomes.\r\n\r\nAnother approach is the so-called â\x80\x9C\
      moment-basedâ\x80\x9D approach. Here, one is interested in the second or higher\
      \ moments of a distribution, roughly corresponding to variance, skewness and\
      \ kurtosis. Skewness is of particular interest because it seems that risk-seeking\
      \ persons (gamblers) can be attracted by positively skewed outcomes. Bets that\
      \ offer a small probability of a high outcome are  attractive to gamblers (Garrett\
      \ and Sobel, 1999).\r\n\r\nOverall, risk is not a unitary concept and should\
      \ be very carefully defined.\r\n\r\nNote that the term risk as used here should\
      \ be distinguished from the way the term is used in sentences such as &#34;risk\
      \ of developing Parkinson&#39;s disease&#34;. An epidemiologist could help on\
      \ the definition in that context.\r\n\r\nInput by other contributors:\r\nthe\
      \ probability or likelihood that an event will occur; possibility of loss or\
      \ injury; someone or something that creates or suggests a hazard; the chance\
      \ that an investment will lose value."
    part_of:
    - decision_making
  route_knowledge:
    label: route knowledge
    standard_code: route_knowledge
    ca_id: trm_4a3fd79d0afda
    definition_text: is represented as a series of directions to follow to get from
      one place to another.
    broader:
    - knowledge
  routine:
    label: routine
    standard_code: routine
    ca_id: trm_4a3fd79d0afe6
    definition_text: a regular course of procedure; habitual or mechanical performance
      of an established procedure; a reiterated speech or formula; a sequence of computer
      instructions for performing a particular task.
  rule:
    label: rule
    standard_code: rule
    ca_id: trm_4a3fd79d0aff2
    definition_text: a method for performing a psychological operation
  rule_learning:
    label: rule learning
    standard_code: rule_learning
    ca_id: trm_4a3fd79d0affd
    definition_text: process in which a participant gradually acquires knowledge about
      a fixed but unstated standard that defines, for example, the acceptability of
      a response or membership of category
    broader:
    - learning
    part_of:
    - categorization
  sadness:
    label: sadness
    standard_code: sadness
    ca_id: trm_4a3fd79d0b014
    definition_text: an emotion  characterized by feelings of unhappiness, disadvantage,
      loss, and helplessness.
    broader:
    - negative_emotion
    - emotion
  salience:
    label: salience
    standard_code: salience
    ca_id: trm_4a3fd79d0b020
    definition_text: a parameter of a stimulus that indexes its effectiveness.
    part_of:
    - visual_search
  schema:
    label: schema
    standard_code: schema
    ca_id: trm_4a3fd79d0b02c
    definition_text: a structured representation that includes a particular organized
      way of perceiving and responding to a complex situation or set of stimuli.
    part_of:
    - problem_solving
    - perception
  search:
    label: search
    standard_code: search
    ca_id: trm_4a3fd79d0b037
    definition_text: to look into or over carefully or thoroughly in an effort to
      find or discover something; to look through or explore by inspecting possible
      places of concealment or investigating suspicious circumstances; to look at
      as if to discover or penetrate intention or nature; to uncover, find, or come
      to know by inquiry or scrutiny.
  selective_attention:
    label: selective attention
    standard_code: selective_attention
    ca_id: trm_4a3fd79d0b043
    definition_text: When multiple external sensory inputs are present, the process
      of dedicating cognitive and perceptual resources to one type/set of input and
      attenuating receptiveness to other inputs.
    broader:
    - attention
    part_of:
    - active_cognitive_inhibition
    - selective_control
    synonyms:
    - term: controlled attention
      weight: 0.7
    - term: directed attention
      weight: 0.7
  self_monitoring:
    label: self monitoring
    standard_code: self_monitoring
    ca_id: trm_4a3fd79d0b05e
    definition_text: monitoring of one&#39;s own behavior.
    broader:
    - monitoring
  semantic_category:
    label: semantic category
    standard_code: semantic_category
    ca_id: trm_4a3fd79d0b06b
    definition_text: "is a grouping of vocabulary within a language, organizing words\
      \ which are interrelated and define each other in various ways. Also referred\
      \ to as a semantic field.\r\n\r\n"
  semantic_knowledge:
    label: semantic knowledge
    standard_code: semantic_knowledge
    ca_id: trm_4a3fd79d0b077
    definition_text: long-established knowledge about objects, facts, and word meanings.
    broader:
    - long_term_memory
    part_of:
    - language
  semantic_memory:
    label: semantic memory
    standard_code: semantic_memory
    ca_id: trm_4a3fd79d0b083
    definition_text: refers to one&#39;s conceptual knowledge and includes the meanings
      of words, factual information about the world, and other information not related
      to specific events or episodes
    broader:
    - declarative_memory
    part_of:
    - episodic_memory
    - language
  semantic_working_memory:
    label: semantic working memory
    standard_code: semantic_working_memory
    ca_id: trm_4a3fd79d0b08f
    definition_text: Working memory for meaning
    broader:
    - working_memory
  sensory_memory:
    label: sensory memory
    standard_code: sensory_memory
    ca_id: trm_4a3fd79d0b09a
    definition_text: brief storage of sensory information in each of the senses, which
      temporarily holds material (e.g., a perceptual experience) for recoding into
      another memory (such as short-term memory) or for comprehension.
    broader:
    - memory
    synonyms:
    - term: sensory-information store; sensory register
      weight: 0.7
  sequence_learning:
    label: sequence learning
    standard_code: sequence_learning
    ca_id: trm_4a3fd79d0b0a6
    definition_text: learning of a sequence of items or responses in the precise order
      of their presentation.
    broader:
    - learning
  serial_learning:
    label: serial learning
    standard_code: serial_learning
    ca_id: trm_4a3fd79d0b0b1
    definition_text: The process of acquiring information in sequence and following
      an order that must be preserved at recall.
    broader:
    - explicit_learning
  serial_processing:
    label: serial processing
    standard_code: serial_processing
    ca_id: trm_4a3fd79d0b0bd
    definition_text: information processing in which only one sequence of processing
      operations is carried on at a time.
    synonyms:
    - term: intermittent processing
      weight: 0.7
    - term: sequential processing
      weight: 0.7
  serial_search:
    label: serial search
    standard_code: serial_search
    ca_id: trm_4a3fd79d0b0c8
    definition_text: The process of identifying a target within a set of candidate
      elements by testing the identity of each element against the identity of the
      sought after target one at a time.
    broader:
    - search
  shallow_processing:
    label: shallow processing
    standard_code: shallow_processing
    ca_id: trm_4a3fd79d0b0df
    definition_text: a mode of thinking in which one pays attention only to appearances
      and other superficial aspects of the material, typically leading to poor memory
      retention.
  shame:
    label: shame
    standard_code: shame
    ca_id: trm_4a3fd79d0b0eb
    definition_text: a painful emotion caused by consciousness of guilt, shortcoming,
      or impropriety; a condition of humiliating disgrace or disrepute; something
      that brings censure or reproach.
    broader:
    - emotion
  short_term_memory:
    label: short-term memory
    standard_code: short_term_memory
    ca_id: trm_4a3fd79d0b0f7
    definition_text: A limited-capacity and short-lasting representation of information
      in the mind. The duration of short-term memory is on the order of seconds, while
      its capacity is on the order of 4 to 9 independent items.
    broader:
    - memory
    synonyms:
    - term: STM
      weight: 0.7
  skepticism:
    label: skepticism
    standard_code: skepticism
    ca_id: trm_4a3fd79d0b10e
    definition_text: an attitude of doubt or a disposition to incredulity either in
      general or toward a particular object.
  skill:
    label: skill
    standard_code: skill
    ca_id: trm_4a3fd79d0b11a
    definition_text: ' Proficiency, facility, or dexterity that is acquired or developed
      through training or experience.'
  skill_acquisition:
    label: skill acquisition
    standard_code: skill_acquisition
    ca_id: trm_4a3fd79d0b125
    definition_text: The process of learning to perform a task or set of tasks with
      increasing facility. Typically implies the formation of procedural (as distinct
      from semantic or episodic) memories.
    broader:
    - implicit_learning_1
    synonyms:
    - term: skill learning
      weight: 0.7
  gestalt_grouping:
    label: Gestalt grouping
    standard_code: gestalt_grouping
    ca_id: trm_4fb3f4d58aeb0
    definition_text: the ways in which elements are perceived to be grouped together,
      most often described for auditory and visual perception, but may also be a factor
      for other modalities
    part_of:
    - auditory_perception
    - visual_search
    - visual_perception
  social_cognition:
    label: social cognition
    standard_code: social_cognition
    ca_id: trm_4a3fd79d0b13d
    definition_text: the encoding, storage, retrieval, and processing, in the brain,
      of information relating to conspecifics, or members of the same species.
  social_context:
    label: social context
    standard_code: social_context
    ca_id: trm_4a3fd79d0b148
    definition_text: the identical or similar social positions and social roles as
      a whole that influence the individuals of a group.
  social_intelligence:
    label: social intelligence
    standard_code: social_intelligence
    ca_id: trm_4a3fd79d0b154
    definition_text: the ability to function successfully in interpersonal situations.
  somatosensation:
    label: somatosensation
    standard_code: somatosensation
    ca_id: trm_4a3fd79d0b160
    definition_text: the components of the central and peripheral nervous systems
      that receive and interpret sensory information from organs in the joints, ligaments,
      muscles, and skin. This system processes information about the length, degree
      of stretch, tension, and contraction of muscles; pain; temperature; pressure;
      and joint position.
    broader:
    - perception
    part_of:
    - embodied_cognition
    synonyms:
    - term: somatosensory perception
      weight: 0.7
  source_memory:
    label: source memory
    standard_code: source_memory
    ca_id: trm_4a3fd79d0b18f
    definition_text: the episodic source from which a specific item was acquired (e.g.,
      from a person, a book, or television (Schacter, Kaszniak, Kihlstrom, & Valdiserri,
      1991, p. 559).
    broader:
    - episodic_memory
  source_monitoring:
    label: source monitoring
    standard_code: source_monitoring
    ca_id: trm_4a3fd79d0b19b
    definition_text: The process of identifying the the source or context at acquisition
      of information that has been stored in memory.
  spatial_ability:
    label: spatial ability
    standard_code: spatial_ability
    ca_id: trm_4a3fd79d0b1a6
    definition_text: skill in perceiving the visual world, transforming and modifying
      initial perceptions, and mentally recreating spatial aspects of one&#39;s visual
      experience without the relevant stimuli.
  spatial_attention:
    label: spatial attention
    standard_code: spatial_attention
    ca_id: trm_4a3fd79d0b1b2
    definition_text: The allocation or prioritization of mental resources based on
      spatial coordinates (with respect to the body, head etc).
    broader:
    - visual_attention
    part_of:
    - visual_awareness
  spatial_cognition:
    label: spatial cognition
    standard_code: spatial_cognition
    ca_id: trm_4a3fd79d0b1bd
    definition_text: the acquisition, organization, utilization, and revision of knowledge
      about spatial environments.
  spatial_memory:
    label: spatial memory
    standard_code: spatial_memory
    ca_id: trm_4a3fd79d0b1d5
    definition_text: the part of memory  responsible for recording information about
      one&#39;s environment and its spatial orientation.
    broader:
    - memory
    part_of:
    - route_knowledge
  spatial_working_memory:
    label: spatial working memory
    standard_code: spatial_working_memory
    ca_id: trm_4a3fd79d0b1e0
    definition_text: The ability to maintain online information that relates to space.
      This process has limited capacity and its contents are not stored permanently.
    broader:
    - working_memory
  speech_perception:
    label: speech perception
    standard_code: speech_perception
    ca_id: trm_4a3fd79d0b1f7
    definition_text: 'the process by which the sounds of language are heard, interpreted
      and understood. '
    broader:
    - speech_processing
  speech_processing:
    label: speech processing
    standard_code: speech_processing
    ca_id: trm_4a3fd79d0b238
    definition_text: the processing of speech signals
    part_of:
    - language
  speech_production:
    label: speech production
    standard_code: speech_production
    ca_id: trm_4a3fd79d0b247
    definition_text: "is the process by which spoken words are selected to be produced,\
      \ have their phonetics formulated and then finally are articulated by the motor\
      \ system in the vocal apparatus. Speech production can be spontaneous such as\
      \ when a person creates the words of a conversation, reaction such as when they\
      \ name a picture or read aloud a written word, or a vocal imitation such as\
      \ in speech repetition.  Speech production is not the same as language production\
      \ since language can also be produced manually by signs.\r\n"
    broader:
    - language_production
  spreading_activation:
    label: spreading activation
    standard_code: spreading_activation
    ca_id: trm_4a3fd79d0b26d
    definition_text: a method for searching associative networks, neural networks,
      or semantic networks; the search process is initiated by labeling a set of source
      nodes (e.g. concepts in a semantic network) with weights or &#34;activation&#34;
      and then iteratively propagating or &#34;spreading&#34; that activation out
      to other nodes linked to the source nodes.
  stereopsis:
    label: stereopsis
    standard_code: stereopsis
    ca_id: trm_4a3fd79d0b279
    definition_text: the process in visual perception leading to the sensation of
      depth from the two slightly different projections of the world onto the retinas
      of the two eyes.
    broader:
    - binocular_depth_cue
  stereotypes:
    label: stereotypes
    standard_code: stereotypes
    ca_id: trm_4a3fd79d0b285
    definition_text: something conforming to a fixed or general pattern; a standardized
      mental picture that is held in common by members of a group and that represents
      an oversimplified opinion, prejudiced attitude, or uncritical judgment.
  strategy:
    label: strategy
    standard_code: strategy
    ca_id: trm_4a3fd79d0b29c
    definition_text: A plan of action designed to achieve a particular goal.
  stress:
    label: stress
    standard_code: stress
    ca_id: trm_4a3fd79d0b2a8
    definition_text: "refers to the consequence of the failure of an organism â\x80\
      \x93 human or animal â\x80\x93 to respond appropriately to emotional or physical\
      \ threats, whether actual or imagined.\r\n"
  sublexical_route:
    label: sublexical route
    standard_code: sublexical_route
    ca_id: trm_4a3fd79d0b2b4
    definition_text: is a theoretical component of Coltheart&#39;s dual-route reading
      model that refers to using spelling-to-sound correspondences to convert a written
      word (i.e. orthography) into a spoken word (i.e. phonology).  In other words,
      it is the route by which letters are linked to their sounds and the sounds are
      assembled into a whole word pronunciation.  It complements the lexical route
      where the whole word is recognized and linked to its sound.
    part_of:
    - reading
  subliminal_perception:
    label: subliminal perception
    standard_code: subliminal_perception
    ca_id: trm_4a3fd79d0b2bf
    definition_text: "a visual or auditory message that is allegedly perceived psychologically,\
      \ but not consciously;\r\noccurs when a stimulus is too weak to be perceived\
      \ yet a person is influenced by it.\r\n"
  supervisory_attentional_system:
    label: supervisory attentional system
    standard_code: supervisory_attentional_system
    ca_id: trm_4a3fd79d0b2fa
    definition_text: a loosely defined collection of brain processes that are responsible
      for planning, cognitive flexibility, abstract thinking, rule acquisition, initiating
      appropriate actions and inhibiting inappropriate actions, and selecting relevant
      sensory information.
  surprise:
    label: surprise
    standard_code: surprise
    ca_id: trm_4a3fd79d0b306
    definition_text: a brief emotional state that is the result of experiencing an
      unexpected relevant event.
    broader:
    - emotion
  sustained_attention:
    label: sustained attention
    standard_code: sustained_attention
    ca_id: trm_4a3fd79d0b311
    definition_text: the ability to maintain a consistent behavioral response during
      continuous and repetitive activity.
    broader:
    - attention
  syntactic_parsing:
    label: syntactic parsing
    standard_code: syntactic_parsing
    ca_id: trm_4a3fd79d0b340
    definition_text: the way that human beings, rather than computers, analyze a sentence
      or phrase (in spoken language or text) in terms of grammatical constituents,
      identifying the parts of speech, syntactic relations, etc.
  syntactic_processing:
    label: syntactic processing
    standard_code: syntactic_processing
    ca_id: trm_4a3fd79d0b34b
    definition_text: processing of the structural and grammatical aspects of language
  syntax:
    label: syntax
    standard_code: syntax
    ca_id: trm_4a3fd79d0b357
    definition_text: the processing of elements (e.g. linguistic elements, like words)
      that are grouped to form constituents in a connected or orderly manner (e.g.
      phrases or clauses), implying an harmonious arrangement of such elements.
  taste_aversion:
    label: taste aversion
    standard_code: taste_aversion
    ca_id: trm_4a3fd79d0b363
    definition_text: occurs when the taste of a certain food is associated with symptoms
      caused by a toxic, spoiled, or poisonous substance;  generally caused after
      ingestion of the food causes nausea, sickness, or vomiting. The ability to develop
      a taste aversion is considered an adaptive trait or survival mechanism that
      trains the body to avoid poisonous substances (e.g., poisonous berries) before
      they can cause harm.
  text_comprehension:
    label: text comprehension
    standard_code: text_comprehension
    ca_id: trm_4a3fd79d0b37a
    definition_text: Intentional thinking during which meaning is constructed through
      interactions between text and reader.
    broader:
    - language_comprehension
  text_processing:
    label: text processing
    standard_code: text_processing
    ca_id: trm_4a3fd79d0b386
    definition_text: The handling of alphabetic characters
    part_of:
    - word_comprehension
    - text_comprehension
  theory_of_mind:
    label: theory of mind
    standard_code: theory_of_mind
    ca_id: trm_4a3fd79d0b392
    definition_text: the ability for a person to connect emotional states to themselves
      and others and understand that other people may have different  beliefs, desires,
      or intentions from one&#39;s self.  It is intimately connected with the development
      of a person&#39;s ability to analyze and interpret the intentions of others.
    broader:
    - social_cognition
    part_of:
    - empathy
    - joint_attention
    synonyms:
    - term: mentalizing
      weight: 0.7
  thermosensation:
    label: thermosensation
    standard_code: thermosensation
    ca_id: trm_4a3fd79d0b39d
    definition_text: the sensory perception of thermal stimuli.
    broader:
    - somatosensation
  top_down_processing:
    label: top down processing
    standard_code: top_down_processing
    ca_id: trm_4a3fd79d0b3cb
    definition_text: perceptions formed by starting with the larger concept or idea,
      then working down to the finer details of that concept or idea.
  traumatic_memory:
    label: traumatic memory
    standard_code: traumatic_memory
    ca_id: trm_4a3fd79d0b3ef
    definition_text: A type of memory results from trauma experience, such as a natural
      disaster or violent events.
    broader:
    - memory
  uncertainty:
    label: uncertainty
    standard_code: uncertainty
    ca_id: trm_4a3fd79d0b3fa
    definition_text: the lack of knowledge regarding the likelihood of potential outcomes
    part_of:
    - decision_under_uncertainty
    - decision_making
  unconscious_process:
    label: unconscious process
    standard_code: unconscious_process
    ca_id: trm_4a3fd79d0b406
    definition_text: a mental process that you are not directly aware of.
    part_of:
    - subconscious
  utility:
    label: utility
    standard_code: utility
    ca_id: trm_4a3fd79d0b412
    definition_text: a measure of the subjective worth of an outcome.
  valence:
    label: valence
    standard_code: valence
    ca_id: trm_4a3fd79d0b429
    definition_text: the degree of attractiveness an individual, activity, or thing
      possesses as a behavioral goal.
  verbal_fluency:
    label: verbal fluency
    standard_code: verbal_fluency
    ca_id: trm_4a3fd79d0b44c
    definition_text: the ability to rapidly access your mental vocabulary while talking
      or writing.
  verbal_memory:
    label: verbal memory
    standard_code: verbal_memory
    ca_id: trm_4a3fd79d0b457
    definition_text: Recall based on spoken words.
    broader:
    - memory
  optical_illusion:
    label: optical illusion
    standard_code: optical_illusion
    ca_id: trm_4fb2c38960950
    definition_text: A phenomenon in which what is visually perceived does not reflect
      the nature of the objective stimulus.
    broader:
    - multistable_perception
    - visual_perception
    synonyms:
    - term: visual illusion
      weight: 0.7
  visual_attention:
    label: visual attention
    standard_code: visual_attention
    ca_id: trm_4a3fd79d0b46f
    definition_text: two-stage process in which attention is distributed uniformly
      over the external visual scene and processing of information is performed in
      parallel, attention is then concentrated to a specific area of the visual scene
      (i.e. it is focused), and processing is performed in a serial fashion.
    broader:
    - attention
  visual_buffer:
    label: visual buffer
    standard_code: visual_buffer
    ca_id: trm_4a3fd79d0b47b
    definition_text: a short-term memory store for visual information
  visual_imagery:
    label: visual imagery
    standard_code: visual_imagery
    ca_id: trm_4a3fd79d0b487
    definition_text: "an experience that, on most occasions, significantly resembles\
      \ the experience of perceiving some object, event, or scene, but occurs when\
      \ the relevant object, event, or scene is not actually present to the senses.\r\
      \n"
    broader:
    - visual_working_memory
  visual_masking:
    label: visual masking
    standard_code: visual_masking
    ca_id: trm_4a3fd79d0b492
    definition_text: the reduction or elimination of the visibility of a brief a target
      stimulus by the presentation of a second stimulus (the mask) contiguous in space
      and/or time
    synonyms:
    - term: masking
      weight: 0.7
  visual_memory:
    label: visual memory
    standard_code: visual_memory
    ca_id: trm_4a3fd79d0b49e
    definition_text: a part of memory  preserving some characteristics of our senses
      pertaining to visual experience.
    broader:
    - memory
  visual_object_recognition:
    label: visual object recognition
    standard_code: visual_object_recognition
    ca_id: trm_4a3fd79d0b4a9
    definition_text: is the process of identifying an object based on its visual attributes
    broader:
    - visual_recognition
    - object_recognition
  visual_perception:
    label: visual perception
    standard_code: visual_perception
    ca_id: trm_4a3fd79d0b4b5
    definition_text: Visual perception is the ability to interpret the surrounding
      environment by processing information that is contained in visible light. The
      resulting perception is also known as eyesight, sight, or vision.
    broader:
    - perception
    part_of:
    - audiovisual_perception
    - blindsight
  visual_representation:
    label: visual representation
    standard_code: visual_representation
    ca_id: trm_4a3fd79d0b4c1
    definition_text: An internal representation of visual information
    broader:
    - mental_representation
  visual_search:
    label: visual search
    standard_code: visual_search
    ca_id: trm_4a3fd79d0b4cd
    definition_text: orienting for targets in an array or a natural scene, through
      both covert and overt shifts in attention; this is different from the visual
      search task in that it refers to a general phenomenon and not to a paradigm.
    broader:
    - search
  visual_working_memory:
    label: visual working memory
    standard_code: visual_working_memory
    ca_id: trm_4a3fd79d0b4d8
    definition_text: The ability to maintain visual information online for a limited
      time interval (~ 4 sec). This information is not stored permanently.
    broader:
    - working_memory
    - visual_memory
  visuospatial_sketch_pad:
    label: visuospatial sketch pad
    standard_code: visuospatial_sketch_pad
    ca_id: trm_4a3fd79d0b507
    definition_text: 'The cognitive construct and mental process of temporarily storing
      visual and spatial information for online use in operations of working memory
      (c.f., Alan Baddeley) . '
    part_of:
    - visual_working_memory
    - spatial_working_memory
  wisdom:
    label: wisdom
    standard_code: wisdom
    ca_id: trm_4a3fd79d0b530
    definition_text: accumulated philosophic or scientific learning.
  word_comprehension:
    label: word comprehension
    standard_code: word_comprehension
    ca_id: trm_4a3fd79d0b548
    definition_text: the ability to understand the meaning of words.
    broader:
    - language_comprehension
  word_generation:
    label: word generation
    standard_code: word_generation
    ca_id: trm_4a3fd79d0b55f
    definition_text: 'The cognitive process of producing words on ones own term instead
      of extracting them from an outside source.  '
    synonyms:
    - term: word production
      weight: 0.7
  word_order:
    label: word order
    standard_code: word_order
    ca_id: trm_4a3fd79d0b56b
    definition_text: is the sequence of the syntactic constituents of a language.
  word_pronunciation:
    label: word pronunciation
    standard_code: word_pronunciation
    ca_id: trm_4a3fd79d0b583
    definition_text: is the act or result of producing the sounds of speech, including
      articulation, stress, and intonation, often with reference to some standard
      of correctness or acceptability.
    part_of:
    - language
    - word_generation
  word_recognition:
    label: word recognition
    standard_code: word_recognition
    ca_id: trm_4a3fd79d0b58f
    definition_text: the ability of a reader to recognize words correctly and virtually
      effortlessly.
    broader:
    - recognition
    part_of:
    - reading
    - phonological_comparison
  word_repetition:
    label: word repetition
    standard_code: word_repetition
    ca_id: trm_4a3fd79d0b59b
    definition_text: Overt pronounciation of auditorily presented words
    synonyms:
    - term: overt repetition
      weight: 0.7
  working_memory:
    label: working memory
    standard_code: working_memory
    ca_id: trm_4a3fd79d0b5a7
    definition_text: "active maintenance and flexible updating of goal/task relevant\
      \ information (items, goals, strategies, etc.) in a form that resists interference\
      \ but has limited capacity. These representations may involve flexible binding\
      \ of representations, may be characterized by the absence of external support\
      \ for the internally maintained representations, and are frequently temporary\
      \ due to ongoing interference\r\n"
    broader:
    - memory
    part_of:
    - decision_making
  action_initiation:
    label: action initiation
    standard_code: action_initiation
    ca_id: trm_4a3fd79d0b5c0
    definition_text: the facilitation or initiation of an act
  attention_shift:
    label: attention shift
    standard_code: attention_shift
    ca_id: trm_4a3fd79d0b5d7
    definition_text: The change that occurs when information that is currently active
      in the mind is replaced by other information. The information content is typically
      sensory in nature.
    broader:
    - attention
  attention_span:
    label: attention span
    standard_code: attention_span
    ca_id: trm_4a3fd79d0b5e3
    definition_text: Amount of time or space that an individual can dedicate to particular
      task or content without becoming distracted.
    part_of:
    - attention
  attentional_focusing:
    label: attentional focusing
    standard_code: attentional_focusing
    ca_id: trm_4a3fd79d0b5ef
    definition_text: The ability to focus attention on cues in the environment that
      are relevant to the task in hand; can also include suppression of distracting
      stimuli
    part_of:
    - attention
  attention_shifting:
    label: attention shifting
    standard_code: attention_shifting
    ca_id: trm_4a3fd79d0b5fb
    definition_text: The process by which information that is currently relevant in
      the mind is replaced by other information. This information is typically sensory
      in nature but may also be semantic.
  set_shifting:
    label: set shifting
    standard_code: set_shifting
    ca_id: trm_4a3fd79d0b607
    definition_text: disengagement of an irrelevant task set and subsequent engagement
      of a relevant task set despite interference and/or priming
    broader:
    - task_switching
    synonyms:
    - term: mental set shifting
      weight: 0.7
    - term: task set reconfiguration
      weight: 0.7
  task_switching:
    label: task switching
    standard_code: task_switching
    ca_id: trm_4a3fd79d0b613
    definition_text: The process of switching from one task or goal to another, depending
      on the context or instructions, that is, the process of switching between task
      sets.
    broader:
    - cognitive_control
  decision:
    label: decision
    standard_code: decision
    ca_id: trm_4a3fd79d0b61f
    definition_text: The outcome of a process during which a choice is made, usually
      between several possible options
  framing:
    label: framing
    standard_code: framing
    ca_id: trm_4a3fd79d0b636
    definition_text: "Framing is a method of biasing opinions- a framing effect occurs\
      \ when the description of information, such as a speaker presenting an issue,\
      \ has an emphasis on a subset of potentially <br />\r\nrelevant considerations\
      \ and causes individuals to focus on these considerations when constructing\
      \ their opinions."
  risk_aversion:
    label: risk aversion
    standard_code: risk_aversion
    ca_id: trm_4a3fd79d0b642
    definition_text: None
  risk_seeking:
    label: risk seeking
    standard_code: risk_seeking
    ca_id: trm_4a3fd79d0b64e
    definition_text: "The willingness of an individual to choose an option with a\
      \ less-than-certain probability of reward over an option with a certain reward\
      \ of equal or higher expected value. \r\n\r\nBEHAVIORAL PHENOMENA"
    part_of:
    - risk_processing
  emotion_perception:
    label: emotion perception
    standard_code: emotion_perception
    ca_id: trm_4a3fd79d0b65a
    definition_text: The process involving understanding feelings with different valences
      of oneself or of others
  emotion_recognition:
    label: emotion recognition
    standard_code: emotion_recognition
    ca_id: trm_4a3fd79d0b665
    definition_text: The process of assigning an emotion to one of the discrete categories
      of emotion available in a particular culture.
    broader:
    - recognition
    part_of:
    - emotion
  emotional_bonding:
    label: emotional bonding
    standard_code: emotional_bonding
    ca_id: trm_4a3fd79d0b671
    definition_text: "A process of bringing people together based on mutually shared\
      \ emotions.\r\n"
  empathy:
    label: empathy
    standard_code: empathy
    ca_id: trm_4a3fd79d0b67d
    definition_text: 'The act of understanding, being aware of, being sensitive to,
      and or experiencing the feelings, thoughts, and experience of another. '
    part_of:
    - altruism
  fear:
    label: fear
    standard_code: fear
    ca_id: trm_4a3fd79d0b689
    definition_text: "A state of high negative emotional arousal triggered by an impending\
      \ threat (real or imaginary) and generally associated with the flight or fight\
      \ response. Fear is the activation of the brainâ\x80\x99s defensive motivational\
      \ system to promote behaviors that protect the organism from perceived danger.\
      \ Normal fear involves a pattern of adaptive responses to conditioned or unconditioned\
      \ threat stimuli (exteroceptive or interoceptive). Fear can involve internal\
      \ representations and cognitive processing, and can be modulated by a variety\
      \ of factors."
    broader:
    - negative_emotion
    synonyms:
    - term: acute threat
      weight: 0.7
  frustration:
    label: frustration
    standard_code: frustration
    ca_id: trm_4a3fd79d0b695
    definition_text: a deep chronic sense or state of insecurity and dissatisfaction
      arising from unresolved problems or unfulfilled needs.
  grief:
    label: grief
    standard_code: grief
    ca_id: trm_4a3fd79d0b6a1
    definition_text: deep and poignant distress caused by or as if by bereavement.
  happiness:
    label: happiness
    standard_code: happiness
    ca_id: trm_4a3fd79d0b6ad
    definition_text: a state of mind or feeling characterized by contentment, love,
      satisfaction, pleasure, or joy.
  discourse:
    label: discourse
    standard_code: discourse
    ca_id: trm_4a3fd79d0b6c5
    definition_text: the capacity of orderly thought or procedure, verbal interchange
      of ideas; formal and orderly and usually extended expression of thought on a
      subject, connected speech or writing, linguistic unit larger than a sentence.
  discourse_comprehension:
    label: discourse comprehension
    standard_code: discourse_comprehension
    ca_id: trm_4a3fd79d0b6d1
    definition_text: Discourse comprehension is the act of interpreting a written
      or spoken message by integrating the incoming information into the memory or
      knowledge structures of the interpreter.
    broader:
    - language_comprehension
  discourse_knowledge:
    label: discourse knowledge
    standard_code: discourse_knowledge
    ca_id: trm_4a3fd79d0b6dd
    definition_text: "knowledge regarding discourse\r\n"
    broader:
    - knowledge
  discourse_planning:
    label: discourse planning
    standard_code: discourse_planning
    ca_id: trm_4a3fd79d0b6e9
    definition_text: "the formulation of structures, patterns, mental representations,\
      \ and processes that constitute the written and spoken unit of connected speech\
      \ or writing longer than a sentence.\r\n"
    broader:
    - planning
  discourse_processing:
    label: discourse processing
    standard_code: discourse_processing
    ca_id: trm_4a3fd79d0b6f5
    definition_text: "is the cognitive process that investigates the structures, patterns,\
      \ mental representations, and processes that underlie the written and spoken\
      \ unit of connected speech or writing longer than a sentence.\r\n\r\n"
  discourse_production:
    label: discourse production
    standard_code: discourse_production
    ca_id: trm_4a3fd79d0b701
    definition_text: "the formation of a spoken unit of connected speech or writing\
      \ longer than a sentence.\r\n"
  grammatical_encoding:
    label: grammatical encoding
    standard_code: grammatical_encoding
    ca_id: trm_4a3fd79d0b756
    definition_text: "the selection of semantically appropriate lexical items and\
      \ the generation of a syntactic frame or surface form.\r\n\r\n"
    broader:
    - encoding
  grapheme:
    label: grapheme
    standard_code: grapheme
    ca_id: trm_4a3fd79d0b76e
    definition_text: a unit (as a letter or digraph) of a writing system; the set
      of units of a writing system (as letters and letter combinations) that represent
      a phoneme.
  graphemic_buffer:
    label: graphemic buffer
    standard_code: graphemic_buffer
    ca_id: trm_4a3fd79d0b779
    definition_text: a component dedicated to the temporary storage of abstract orthographic
      representations prior to their format-specific expression in spelling and/or
      reading.
  illocutionary_force:
    label: illocutionary force
    standard_code: illocutionary_force
    ca_id: trm_4a3fd79d0b7b5
    definition_text: a speaker&#39;s intention in delivering an utterance.
  language_acquisition:
    label: language acquisition
    standard_code: language_acquisition
    ca_id: trm_4a3fd79d0b7f4
    definition_text: the process by which humans acquire the capacity to perceive,
      produce and use words to understand and communicate.
  language_processing:
    label: language processing
    standard_code: language_processing
    ca_id: trm_4a3fd79d0b802
    definition_text: the way human beings process speech or writing and understand
      it as language.
    part_of:
    - language
  lexical_access:
    label: lexical access
    standard_code: lexical_access
    ca_id: trm_4a3fd79d0b80f
    definition_text: the process by which contact is made with the lexicon on the
      basis of an initial acoustic-phonetic or phonological representation of some
      portion of the speech input, the result of lexical success is a cohort of potential
      word candidates which are compatible with this initial analysis.
  lexical_ambiguity:
    label: lexical ambiguity
    standard_code: lexical_ambiguity
    ca_id: trm_4a3fd79d0b81b
    definition_text: the presence of two or more possible meanings within a single
      word.
  lexical_processing:
    label: lexical processing
    standard_code: lexical_processing
    ca_id: trm_4a3fd79d0b826
    definition_text: A general term referring to the processing of single words, typically
      in the context of visual or auditory word recognition.
    part_of:
    - sentence_processing
    - language
  morphological_processing:
    label: morphological processing
    standard_code: morphological_processing
    ca_id: trm_4a3fd79d0b832
    definition_text: 'is how the brain registers the patterns of word formation in
      a particular language, including inflection, derivation, and composition. '
  morphology:
    label: morphology
    standard_code: morphology
    ca_id: trm_4a3fd79d0b83e
    definition_text: the structure and content of word forms
  orthography:
    label: orthography
    standard_code: orthography
    ca_id: trm_4a3fd79d0b84a
    definition_text: "the representation of the sounds of a language by written or\
      \ printed symbols; a part of language study that deals with letters and spelling.\r\
      \n"
    part_of:
    - language
  phonetics:
    label: phonetics
    standard_code: phonetics
    ca_id: trm_4a3fd79d0b862
    definition_text: the system of speech sounds of a language or group of languages;
      the study and systematic classification of the sounds made in spoken utterance.
  semantic_processing:
    label: semantic processing
    standard_code: semantic_processing
    ca_id: trm_4a3fd79d0b87a
    definition_text: the cognitive processing of extracting meaning from any form
      of language (e.g. human language, programming language) as well as formal logics
      and semiotics
    broader:
    - spreading_activation
    part_of:
    - semantic_categorization
  sentence_comprehension:
    label: sentence comprehension
    standard_code: sentence_comprehension
    ca_id: trm_4a3fd79d0b892
    definition_text: takes place whenever a reader or listener processes a language
      utterance, either in isolation or in the context of a conversation or a text.
    broader:
    - language_comprehension
    part_of:
    - language
  sentence_processing:
    label: sentence processing
    standard_code: sentence_processing
    ca_id: trm_4a3fd79d0b89e
    definition_text: "takes place whenever a reader or listener cognitively processes\
      \ a language utterance, either in isolation or in the context of a conversation\
      \ or a text.\r\n"
    broader:
    - language_processing
    part_of:
    - narrative_comprehension
  sentence_production:
    label: sentence production
    standard_code: sentence_production
    ca_id: trm_4a3fd79d0b8aa
    definition_text: The creation and/or utterance of a sentence
  active_recall:
    label: active recall
    standard_code: active_recall
    ca_id: trm_4a3fd79d0b8b5
    definition_text: a principle of efficient learning, which claims the need to actively
      stimulate memory during the learning process.
  active_retrieval:
    label: active retrieval
    standard_code: active_retrieval
    ca_id: trm_4a3fd79d0b8c1
    definition_text: "Effortful (volitional) attempt to consciously recollect a memory;\
      \ often required when retrieval cannot be automatically driven by stimuli.\r\
      \n"
    part_of:
    - explicit_memory
  consolidation:
    label: consolidation
    standard_code: consolidation
    ca_id: trm_4a3fd79d0b8cd
    definition_text: the process by which a representation becomes stabilized
    part_of:
    - long_term_memory
    - reconsolidation
  elaborative_rehearsal:
    label: elaborative rehearsal
    standard_code: elaborative_rehearsal
    ca_id: trm_4a3fd79d0b8d9
    definition_text: a type of rehearsal proposed by Craik and Lockhart (1972) in
      their Levels of Processing model of memory. Elaborative rehearsal involves deep
      semantic processing of a to-be-remembered item resulting in the production of
      durable memories.
  encoding:
    label: encoding
    standard_code: encoding
    ca_id: trm_4a3fd79d0b8e5
    definition_text: The process of creating a new memory trace.
    part_of:
    - memory
    synonyms:
    - term: memory encoding
      weight: 0.7
  episodic_buffer:
    label: episodic buffer
    standard_code: episodic_buffer
    ca_id: trm_4a3fd79d0b8f0
    definition_text: 'A theoretical construct that is part of Alan Baddeley&#39;s
      working memory model and the object of which is to integrate information across
      sensory domains and communicate with long term memory in the service of working
      memory. '
    part_of:
    - working_memory
  familiarity:
    label: familiarity
    standard_code: familiarity
    ca_id: trm_4a3fd79d0b8fc
    definition_text: A quality of memory that is associated with a feeling of knowing
      that an event has previously occurred, but often not including enough contextual
      or episodic details sufficient for claiming actual remembering of the event.
    part_of:
    - declarative_memory
  forgetting:
    label: forgetting
    standard_code: forgetting
    ca_id: trm_4a3fd79d0b908
    definition_text: The loss of or inability to retrieve a memory.
  memory_acquisition:
    label: memory acquisition
    standard_code: memory_acquisition
    ca_id: trm_4a3fd79d0b914
    definition_text: "is the process of storage and retrieval of new information in\
      \ memory.\r\n"
  memory_consolidation:
    label: memory consolidation
    standard_code: memory_consolidation
    ca_id: trm_4a3fd79d0b920
    definition_text: 'a category of processes that stabilize a memory trace after
      the initial acquisition. '
    broader:
    - consolidation
  memory_decay:
    label: memory decay
    standard_code: memory_decay
    ca_id: trm_4a3fd79d0b92c
    definition_text: the loss of memory over time.
  memory_storage:
    label: memory storage
    standard_code: memory_storage
    ca_id: trm_4a3fd79d0b938
    definition_text: The representation of information in the brain in a form that
      enables potential retrieval at a later time.
    part_of:
    - retention
  memory_trace:
    label: memory trace
    standard_code: memory_trace
    ca_id: trm_4a3fd79d0b943
    definition_text: A residual, and often decayed, neural representation of previous
      knowledge or experience.
    part_of:
    - rehearsal_loop
  metamemory:
    label: metamemory
    standard_code: metamemory
    ca_id: trm_4a3fd79d0b94f
    definition_text: 'subjective awareness of and knowledge about memory, and strategies
      for its effective access and application; includes: awareness of memory contents,
      different and appropriate memory strategies for particular tasks, and how to
      use a given memory strategy most effectively.'
    broader:
    - metacognition
  recall:
    label: recall
    standard_code: recall
    ca_id: trm_4a3fd79d0b95b
    definition_text: The process of retrieving previously stored information, done
      without the aid of external cues.
    broader:
    - memory
    part_of:
    - declarative_memory
  recognition:
    label: recognition
    standard_code: recognition
    ca_id: trm_4a3fd79d0b967
    definition_text: assigning a detected stimulus into a category (not necessarily
      task defined)
    broader:
    - memory
    part_of:
    - declarative_memory
  reconsolidation:
    label: reconsolidation
    standard_code: reconsolidation
    ca_id: trm_4a3fd79d0b972
    definition_text: the process of previously consolidated memories being recalled
      and actively consolidated, it is a distinct process that serves to maintain,
      strengthen and modify memories that are already stored in the long-term memory.
    broader:
    - memory_consolidation
  acuity:
    label: acuity
    standard_code: acuity
    ca_id: trm_4a3fd79d0b98a
    definition_text: 'accuracy of perception. '
  echolocation:
    label: echolocation
    standard_code: echolocation
    ca_id: trm_4a3fd79d0b996
    definition_text: the general method of locating objects by determining the time
      for an echo to return and the direction from which it returns, used by some
      animals
  edge_detection:
    label: edge detection
    standard_code: edge_detection
    ca_id: trm_4a3fd79d0b9a1
    definition_text: a fundamental tool in image processing and computer vision, particularly
      in the areas of feature detection and feature extraction, which aim at identifying
      points in a digital image at which the image brightness changes sharply or more
      formally has discontinuities.
    broader:
    - feature_detection
  feature_detection:
    label: feature detection
    standard_code: feature_detection
    ca_id: trm_4a3fd79d0b9ad
    definition_text: 'a process of recognizing specific aspects of a stimulus, such
      as lines, edges, angle, or movement. '
    broader:
    - detection
    part_of:
    - feature_comparison
    - feature_integration
  figure_ground_reversal:
    label: figure ground reversal
    standard_code: figure_ground_reversal
    ca_id: trm_4a3fd79d0b9d1
    definition_text: Occurs in certain visual illusions (e.g., Vases and Faces or
      &#34;Rubin&#39;s Vase&#34;) in which there are multiple valid figure-ground
      segmentations that can be selected depending on an observer&#39;s interpretation.
  figure_ground_segregation:
    label: figure ground segregation
    standard_code: figure_ground_segregation
    ca_id: trm_4a3fd79d0b9dd
    definition_text: Discriminating objects from their surroundings by the visual
      system.
    part_of:
    - visual_perception
  gustation_processing:
    label: gustation processing
    standard_code: gustation_processing
    ca_id: trm_4a3fd79d0b9e9
    definition_text: Form of chemoreception that facilitates taste perception.
    broader:
    - perception
    synonyms:
    - term: gustation
      weight: 0.7
  memory_retrieval:
    label: memory retrieval
    standard_code: memory_retrieval
    ca_id: trm_4a3fd79d0ba01
    definition_text: the process of accessing a stored memory
    broader:
    - retrieval
    part_of:
    - recognition
    - recall
  active_maintenance:
    label: active maintenance
    standard_code: active_maintenance
    ca_id: trm_4a3fd79d0ba0d
    definition_text: The maintenance of information in working memory through active
      (volitional) rather than passive means
    broader:
    - working_memory_maintenance
    part_of:
    - perception
    - working_memory
  articulatory_loop:
    label: articulatory loop
    standard_code: articulatory_loop
    ca_id: trm_4a3fd79d0ba19
    definition_text: "one of the subsystems postulated in Alan Baddeleyâ\x80\x99s\
      \ multicomponent model of WORKING MEMORY, specialized for the temporary storage\
      \ of verbal information.  It consists of a phonological store and an articulatory\
      \ rehearsal process. The phonological store can hold speech-based information,\
      \ subject to a rapid decay. The articulatory rehearsal process can refresh the\
      \ decaying representation by reading it off and feeding it back to the store.\
      \ It also serves to convert visually presented information (such as written\
      \ words) into phonological codes and register them into the phonological store. "
    broader:
    - rehearsal_loop
    part_of:
    - working_memory
    synonyms:
    - term: phonological loop
      weight: 0.7
  central_executive:
    label: central executive
    standard_code: central_executive
    ca_id: trm_4a3fd79d0ba25
    definition_text: Theoretical &#39;top-down&#39; cognitive system responsible for
      the management of executive functions including planning, working memory, attention,
      problem solving, reasoning, inhibition, multi-tasking, and the initiation and
      monitoring of actions.
    part_of:
    - cognitive_control
    - working_memory
  maintenance:
    label: maintenance
    standard_code: maintenance
    ca_id: trm_4a3fd79d0ba30
    definition_text: The process of keeping information in active and immediately
      accessible state.
    part_of:
    - working_memory
  manipulation:
    label: manipulation
    standard_code: manipulation
    ca_id: trm_4a3fd79d0ba3c
    definition_text: performance of operations upon information held in working memory
  phonological_loop:
    label: phonological loop
    standard_code: phonological_loop
    ca_id: trm_4a3fd79d0ba48
    definition_text: 'deals with sound or phonological information and consists of
      two parts: a short-term phonological store with auditory  memory traces that
      are subject to rapid decay and an articulatory rehearsal component that can
      revive the memory traces. '
    broader:
    - rehearsal_loop
    part_of:
    - auditory_working_memory
  rehearsal:
    label: rehearsal
    standard_code: rehearsal
    ca_id: trm_4a3fd79d0ba54
    definition_text: The repetition of information in an attempt to maintain it longer
      in memory.
    part_of:
    - short_term_memory
  rehearsal_loop:
    label: rehearsal loop
    standard_code: rehearsal_loop
    ca_id: trm_4a3fd79d0ba60
    definition_text: 'or phonological loop, also called the phonetic loop or the articulatory
      loop, is the part of working memory that rehearses verbal information. It consists
      of two parts: a short-term phonological store with auditory memory traces that
      are subject to rapid decay and an articulatory rehearsal component that can
      revive the memory traces.The first component is a phonological memory store
      which can hold traces of acoustic or speech based material. Material in this
      short term store lasts about two seconds unless it is maintained through the
      use of the second subcomponent, articulatory subvocal rehearsal. Prevention
      of articulatory rehearsal results in very rapid forgetting (a process known
      as decay). '
    part_of:
    - phonological_working_memory
    - working_memory
  working_memory_retrieval:
    label: working memory retrieval
    standard_code: working_memory_retrieval
    ca_id: trm_4a3fd79d0ba6c
    definition_text: The process of accessing information that is maintained in working
      memory; the sub-process by which the contents of working memory are accessed.
    part_of:
    - working_memory
  working_memory_storage:
    label: working memory storage
    standard_code: working_memory_storage
    ca_id: trm_4a3fd79d0ba77
    definition_text: The maintenance of information of working memory; a sub-component
      of working memory that allows for contents of working memory to be retained.
    part_of:
    - working_memory
  test_term:
    label: test term
    standard_code: test_term
    ca_id: trm_4a7b128b8b2d0
    definition_text: None
  cognitive_control:
    label: cognitive control
    standard_code: cognitive_control
    ca_id: trm_4aae62e4ad209
    definition_text: The top-down modulation of cognitive processes based on higher-order
      representations such as goals or plans.
    synonyms:
    - term: executive control
      weight: 0.7
    - term: executive function
      weight: 0.7
  echoic_memory:
    label: echoic memory
    standard_code: echoic_memory
    ca_id: trm_4b185801de7a1
    definition_text: refers to the phenomenon in which there is a brief mental echo
      that continues to sound after an auditory stimulus has been heard.
    broader:
    - auditory_memory
  reward_processing:
    label: reward processing
    standard_code: reward_processing
    ca_id: trm_4b6525253c63f
    definition_text: A positive return for performance of a specific behavior.
    broader:
    - positive_feedback_processing
    - feedback_processing
    part_of:
    - reward_learning
    - reward_valuation
    - addiction
    synonyms:
    - term: reinforcement
      weight: 0.7
    - term: reward
      weight: 0.7
  pain:
    label: pain
    standard_code: pain
    ca_id: trm_4b65259eeee34
    definition_text: An unpleasant sensory and emotional experience associated with
      actual or potential tissue damage.
    broader:
    - nociception
    - somatosensation
  joint_attention:
    label: joint attention
    standard_code: joint_attention
    ca_id: trm_4b75ed06c917d
    definition_text: the process of alerting one person to a stimulus through nonverbal
      cues such as finger pointing or gazing. It is one of the first signs of the
      development of a theory of mind in babies and serves as an important step to
      later language and social development.
    synonyms:
    - term: mutual knowledge
      weight: 0.7
  behavioral_inhibition_cognitive:
    label: behavioral inhibition (cognitive)
    standard_code: behavioral_inhibition_cognitive
    ca_id: trm_4b7c270940f9d
    definition_text: "Often used as a synonym of &#34;response inhibition&#34; to\
      \ describe the inhibition of actions.\r\n"
    part_of:
    - cognitive_control
    - extinction
    - response_inhibition
  behavioral_inhibition_temperament:
    label: behavioral inhibition (temperament)
    standard_code: behavioral_inhibition_temperament
    ca_id: trm_4b7c27094a093
    definition_text: A temperamental characteristic described by shyness and social
      anxiety.
  central_coherence:
    label: central coherence
    standard_code: central_coherence
    ca_id: trm_4b82c75498408
    definition_text: a person&#39;s ability to understand things in context, frequently
      described as a deficit in literature on autism
  interference_resolution:
    label: interference resolution
    standard_code: interference_resolution
    ca_id: trm_4c3e04d656f06
    definition_text: The process of selecting information with regard to its relevance
      to an ongoing task and suppressing the processing of irrelevant information.
    broader:
    - cognitive_control
    part_of:
    - working_memory
    synonyms:
    - term: interference control
      weight: 0.7
  updating:
    label: updating
    standard_code: updating
    ca_id: trm_4c3e05903e4bb
    definition_text: The revision or refreshing of information that is maintained
      in working memory
    broader:
    - cognitive_control
    part_of:
    - working_memory
  task_set:
    label: task set
    standard_code: task_set
    ca_id: trm_4c3e0646a2408
    definition_text: The set of rules and/or stimulus-response mappings that define
      how a task should be performed.
  subconscious:
    label: subconscious
    standard_code: subconscious
    ca_id: trm_4d21e9a7dd8ca
    definition_text: "Subconscious is any neural activity which has the potential\
      \ to be conscious, but at the moment is processed below the level of consciousness.\r\
      \n\r\nIn contrast to unconscious information processing, subconscious processing\
      \ contains meaning (semantic information).\r\n\r\nIntuition is a good example\
      \ for subconscious information processing. In other words, intuition means thinking\
      \ below the level of consciousness whereby only the output enters the stream\
      \ of consciousness.\r\n\r\nfrom Peter Walla"
  semantic_information:
    label: semantic information
    standard_code: semantic_information
    ca_id: trm_4d2201d530697
    definition_text: information that is not tied to any specific object, event, domain,
      or application. It includes general factual information about the world (as
      in an encyclopedia) and oneself.
    synonyms:
    - term: semantic knowledge
      weight: 0.7
  paraphasia:
    label: paraphasia
    standard_code: paraphasia
    ca_id: trm_4d7fa1a3e2a10
    definition_text: "generally refers to errors in naming. Collectively, this term\
      \ is applied to any unintended error of word or sound choice.\r\n"
  phonemic_paraphasia:
    label: phonemic paraphasia
    standard_code: phonemic_paraphasia
    ca_id: trm_4d7fa1ee2f870
    definition_text: "is the production of unintended sounds or syllables in the utterance\
      \ of partially recognizable word, e.g., â\x80\x98pakerâ\x80\x99 for â\x80\x98\
      paper.â\x80\x99\r\n"
  neologism:
    label: neologism
    standard_code: neologism
    ca_id: trm_4d7fa2df05f23
    definition_text: "is the production of nonsense word or words, usually without\
      \ recognition of errors, e.g., â\x80\x98tableâ\x80\x99 becomes â\x80\x98tilto.â\x80\
      \x99\r\n\r\n"
  metacomprehension:
    label: metacomprehension
    standard_code: metacomprehension
    ca_id: trm_4d7fc763cf777
    definition_text: "refers to the learners&#39; ability to monitor the degree to\
      \ which they understand information being communicated to them, to recognize\
      \ failures to comprehend, and to employ repair strategies when failures are\
      \ identified.\r\n"
  conceptual_metaphor:
    label: conceptual metaphor
    standard_code: conceptual_metaphor
    ca_id: trm_4d920c905d465
    definition_text: "In cognitive linguistics, metaphor is defined as understanding\
      \ one conceptual domain in terms of another conceptual domain; for example,\
      \ using one person&#39;s life experience to understand a different person&#39;s\
      \ experience. A conceptual domain can be any coherent organization of experience.\r\
      \n\r\n"
  body_representation:
    label: body representation
    standard_code: body_representation
    ca_id: trm_4e5505361f160
    definition_text: A mental representation of one&#39;s own body
  delusion:
    label: delusion
    standard_code: delusion
    ca_id: trm_4fa3afaeef512
    definition_text: A belief held despite appreciable external evidence to the contrary.
  deliberation:
    label: deliberation
    standard_code: deliberation
    ca_id: trm_4fa28299dbddd
    definition_text: the process of judging the merits of multiple options, which
      may then be followed by choice.
    synonyms:
    - term: consideration
      weight: 0.7
  thought:
    label: thought
    standard_code: thought
    ca_id: trm_4fa295124a375
    definition_text: Subjectively salient cognitive processing, at least part of which
      may be reportable.
  multisensory_integration:
    label: multisensory integration
    standard_code: multisensory_integration
    ca_id: trm_4e31ced566649
    definition_text: The process by which unisensory signals are combined to form
      a new product. It is operationally defined as a multisensory response (neural
      or behavioral) that is significantly different from the responses evoked by
      the modality-specific component stimuli
  crossmodal:
    label: crossmodal
    standard_code: crossmodal
    ca_id: trm_4e31d2241319f
    definition_text: A complex of two or more modality-specific [unimodal] stimuli
    synonyms:
    - term: cross-modal
      weight: 0.7
  unisensory:
    label: unisensory
    standard_code: unisensory
    ca_id: trm_4e31d365bc7e2
    definition_text: 'Describes any sensory process associated with a single sensory
      modality '
  multisensory:
    label: multisensory
    standard_code: multisensory
    ca_id: trm_4e31d3ba7d25b
    definition_text: 'a process associated with multiple sensory modalities '
  synchrony_perception:
    label: synchrony perception
    standard_code: synchrony_perception
    ca_id: trm_4e31e6dca01ca
    definition_text: the process of perceiving whether or not the crossmodal cues
      (e.g., audio and visual) to an event (e.g., audiovisual speech) are in temporal
      synchrony with each other.
    broader:
    - perception
  tactile_working_memory:
    label: tactile working memory
    standard_code: tactile_working_memory
    ca_id: trm_4e416f1373936
    definition_text: working memory for tactile information
    broader:
    - working_memory
  interoceptive_representation:
    label: interoceptive representation
    standard_code: interoceptive_representation
    ca_id: trm_4e5506161998c
    definition_text: A representation of the internal state of the body
    broader:
    - body_representation
    part_of:
    - interoception
  sense_of_ownership:
    label: sense of ownership
    standard_code: sense_of_ownership
    ca_id: trm_4e5badf095692
    definition_text: The feeling that something is part of one self.
    broader:
    - body_representation
  sense_of_body_ownership:
    label: sense of body ownership
    standard_code: sense_of_body_ownership
    ca_id: trm_4e5faabfe8ce3
    definition_text: The feeling that something is part of one&#39;s own body.
    broader:
    - sense_of_ownership
  pain_sensitization:
    label: 'pain sensitization '
    standard_code: pain_sensitization
    ca_id: trm_4e61264db33d4
    definition_text: A painful stimulus is perceived more painful over the time course
      of stimulation.
    part_of:
    - pain
  pain_habituation:
    label: pain habituation
    standard_code: pain_habituation
    ca_id: trm_4e6127bd91be9
    definition_text: A painful stimulus is perceived less painful over the time course
      of stimulation.
    part_of:
    - pain
    synonyms:
    - term: pain adaptation
      weight: 0.7
  priming:
    label: priming
    standard_code: priming
    ca_id: trm_4e89aebaa311d
    definition_text: Priming is the effect of prior exposure to a somehow (e.g. perceptually
      or semantically) related stimulus on the response to a subsequent stimulus.
      This effect may be positive and facilitatory (e.g. naming of an object is typically
      faster when that object has already been recently named) or negative and detrimental
      (e.g. slower response to a previously ignored stimulus).
    broader:
    - implicit_memory
    - implicit_learning_1
  expectancy:
    label: expectancy
    standard_code: expectancy
    ca_id: trm_4ebfe9a465449
    definition_text: A belief about something in the future. Sometimes requires explicit,
      conscious awareness, distinct from unconscious, conditioning-based learning.
    part_of:
    - anticipation
    synonyms:
    - term: expectation
      weight: 0.7
    - term: reward prediction error
      weight: 0.7
  self_control:
    label: self control
    standard_code: self_control
    ca_id: trm_4ee8facd77dfc
    definition_text: The effortful control of behaviors, thoughts, or emotions with
      the aim of increasing the likelihood of attaining long-term over short-term
      outcomes.
    broader:
    - cognitive_control
    synonyms:
    - term: Self-regulation
      weight: 0.7
    - term: willpower
      weight: 0.7
    - term: ego strength
      weight: 0.7
    - term: self-discipline
      weight: 0.7
  embodied_cognition:
    label: embodied cognition
    standard_code: embodied_cognition
    ca_id: trm_4f33e65d0daac
    definition_text: a theory emphasizing the essentiality of the body&#39;s interaction
      with the environment to cognition
  resource:
    label: resource
    standard_code: resource
    ca_id: trm_4f3a72a028d90
    definition_text: any aspect of cognition having bounded availability, eg. memory,
      attention
  curiosity:
    label: curiosity
    standard_code: curiosity
    ca_id: trm_4f3bdeedcc99d
    definition_text: 'wanting knowledge or understanding, often of a novel or unfamiliar
      entity  '
    synonyms:
    - term: inquisitiveness
      weight: 0.7
  visual_awareness:
    label: visual awareness
    standard_code: visual_awareness
    ca_id: trm_4ff36d79c26c6
    definition_text: the subjective experience of seeing, emerging about 200ms after
      the onset of a visual stimulus; it is contrasted with unconscious visual perception
    broader:
    - perception
  imagination:
    label: imagination
    standard_code: imagination
    ca_id: trm_4f4511e519b53
    definition_text: 'forming mental images or concepts of what is not actually present
      to the senses '
    broader:
    - mental_representation
    synonyms:
    - term: envisagement
      weight: 0.7
    - term: representation
      weight: 0.7
    - term: mental conception
      weight: 0.7
  addiction:
    label: addiction
    standard_code: addiction
    ca_id: trm_4fafd1626bf2b
    definition_text: A phenomenon sometimes conflated and sometimes contrasted with
      dependency, in which a person has transitioned from liking a rewarding substance
      or behavior to requiring it.
    synonyms:
    - term: dependency
      weight: 0.7
  self_talk:
    label: self talk
    standard_code: self_talk
    ca_id: trm_4f4672db34a46
    definition_text: 'overt verbalisation of thoughts for the purpose of self motivation,
      problem solving, reasoning, learning or stress management; a behavior commonly
      witnessed in sports-people during moments of performance pressure '
  worldview:
    label: worldview
    standard_code: worldview
    ca_id: trm_4f46753b8be4f
    definition_text: 'overarching subjective account of environmental (ie. that in
      which an agent is situated) characteristics and functions, applicable across
      local and global spatiotemporal scales; a framework of ego-centric ideas and
      beliefs that serves to guide decision making and action, and to generate, sustain,
      and apply knowledge. '
    synonyms:
    - term: perspective
      weight: 0.7
  inattentional_blindness:
    label: inattentional blindness
    standard_code: inattentional_blindness
    ca_id: trm_4fe3861edc919
    definition_text: a phenomenon in which people fail to see an unexpected stimulus
    broader:
    - inattention
    synonyms:
    - term: perceptual blindness
      weight: 0.7
  interoception:
    label: interoception
    standard_code: interoception
    ca_id: trm_4fe39e4388409
    definition_text: perception of stimuli inside the body, e.g. hunger, thirst, pain
    broader:
    - somatosensation
  extinction:
    label: extinction
    standard_code: extinction
    ca_id: trm_4fe8edc62f613
    definition_text: the phenomenon by which a response to a conditional stimulus
      presented in absence of the unconditional stimulus diminishes over time; rather
      than a forgetting, it is generally believed to be a new learning.
    broader:
    - context_memory
    part_of:
    - spontaneous_recovery
    - instrumental_conditioning
    - pavlovian_conditioning
  difference_threshold:
    label: difference threshold
    standard_code: difference_threshold
    ca_id: trm_4fe9fae4321e7
    definition_text: the smallest detectable difference between two stimuli
    synonyms:
    - term: just noticeable difference
      weight: 0.7
    - term: JND
      weight: 0.7
  binocular_depth_cue:
    label: binocular depth cue
    standard_code: binocular_depth_cue
    ca_id: trm_4fea04a02ce37
    definition_text: a cue that provides depth information about a scene when it is
      viewed with both eyes
    part_of:
    - depth_perception
  color_constancy:
    label: color constancy
    standard_code: color_constancy
    ca_id: trm_4fea09fac5316
    definition_text: the ability to assign stable colors despite variation in light,
      i.e. identifying that a given box is orange irrespective of the spectral composition
      or intensity of the light illuminating it
  feature_search:
    label: feature search
    standard_code: feature_search
    ca_id: trm_4fea18ec76bc9
    definition_text: search for a target according to a single feature (e.g. color)
    broader:
    - visual_search
  attentional_blink:
    label: attentional blink
    standard_code: attentional_blink
    ca_id: trm_4fea1aeaa7b17
    definition_text: a phenomenon in which the participant is unable to detect a second
      salient visual stimulus if presented at the same spatial location within 200-500
      milliseconds after the first
    synonyms:
    - term: AB
      weight: 0.7
  change_blindness:
    label: change blindness
    standard_code: change_blindness
    ca_id: trm_4fea238758d33
    definition_text: the inability to detect changes to an object or a scene even
      if large, repeatedly made, or anticipated; it can even occur when the subject
      is fixated on the item being changed.
    broader:
    - inattentional_blindness
  motion_aftereffect:
    label: motion aftereffect
    standard_code: motion_aftereffect
    ca_id: trm_4fea25630ffb5
    definition_text: the illusion of movement in a stationary object after prolonged
      viewing of a moving object
    broader:
    - optical_illusion
  overt_attention:
    label: overt attention
    standard_code: overt_attention
    ca_id: trm_4feb3f8c551cb
    definition_text: directing a sense organ at a stimulus source
    broader:
    - attention
  covert_attention:
    label: covert attention
    standard_code: covert_attention
    ca_id: trm_4feb3ffa1ab51
    definition_text: the act of focusing on one of several sensory stimuli
    broader:
    - attention
  unconscious_perception:
    label: unconscious perception
    standard_code: unconscious_perception
    ca_id: trm_4feb44e5ae25b
    definition_text: the process of perceiving a stimulus without being conscious
      of having seen it, measurable by electrophysiological response at the time and
      by recognition testing later
    broader:
    - unconscious_process
    - perception
    part_of:
    - blindsight
    - priming
  autonoesis:
    label: autonoesis
    standard_code: autonoesis
    ca_id: trm_4ff1fc04e22e8
    definition_text: consciousness of self consistent over time, both in imagining
      the future and recalling the past; consciousness of subjectivity
    broader:
    - consciousness
    part_of:
    - autobiographical_recall
    - episodic_memory
    synonyms:
    - term: autonoetic consciousness
      weight: 0.7
  psychological_refractory_period:
    label: psychological refractory period
    standard_code: psychological_refractory_period
    ca_id: trm_4ffca95528c88
    definition_text: the phenomenon by which people are unable to make more than one
      conscious decision (and, by extension, unable to complete more than one task)
      within a few hundred milliseconds
    synonyms:
    - term: PRP
      weight: 0.7
  noesis:
    label: noesis
    standard_code: noesis
    ca_id: trm_4ffdc96dc85b7
    definition_text: a consciousness characterized by knowing or familiarity without
      self-reference (contrast with autonoesis)
    broader:
    - consciousness
    synonyms:
    - term: noetic consciousness
      weight: 0.7
  impulsivity:
    label: impulsivity
    standard_code: impulsivity
    ca_id: trm_50070dce14554
    definition_text: the tendency to act without adequately assessing context
    part_of:
    - cognitive_control
    synonyms:
    - term: impulsiveness
      weight: 0.7
  binocular_rivalry:
    label: binocular rivalry
    standard_code: binocular_rivalry
    ca_id: trm_500d8626d0770
    definition_text: competition between the eyes for control of perception, particularly
      evident when different stimuli are presented to each eye
  cone_of_confusion:
    label: cone of confusion
    standard_code: cone_of_confusion
    ca_id: trm_500d8839c2877
    definition_text: a region around the head for which neither interaural time differences
      (ITDs) nor interaural loudness differences (ILDs) in a sound are not great enough
      for a person to localize the sound source
  vection:
    label: vection
    standard_code: vection
    ca_id: trm_500d8aef38f2c
    definition_text: the illusion of movement in a stationary person caused by moving
      visual cues
    broader:
    - optical_illusion
  visual_acuity:
    label: visual acuity
    standard_code: visual_acuity
    ca_id: trm_500d8bcf5f29a
    definition_text: a measure of the finest resolution perceivable by the eyes
    part_of:
    - visual_perception
  visual_angle:
    label: visual angle
    standard_code: visual_angle
    ca_id: trm_500d8c8fcc520
    definition_text: the angle a viewed object subtends at the eye, usually stated
      in degrees of arc, and is a function of the size of the object and its distance
      from the eye
    part_of:
    - visual_perception
  domain_specificity:
    label: domain specificity
    standard_code: domain_specificity
    ca_id: trm_5021684cba96c
    definition_text: the idea in cognitive science that the mind is divided according
      to the content of information being processed into specialized, possibly evolved,
      modules
  global_precedence:
    label: global precedence
    standard_code: global_precedence
    ca_id: trm_5021873f37abc
    definition_text: the idea that, all else held equal, global features are perceived
      earlier than are local features of a given stimulus
  anxiety:
    label: anxiety
    standard_code: anxiety
    ca_id: trm_5022ef7599294
    definition_text: An aversive psychophysiological state characterized by fear,
      worry, or concern associated with current or impending threat often elicited
      by general and specific interoceptive or exteroceptive cues.
    broader:
    - emotion
  spontaneous_recovery:
    label: spontaneous recovery
    standard_code: spontaneous_recovery
    ca_id: trm_5024002a85b1f
    definition_text: recovery of a conditioned response following extinction, simply
      as a function of time
    synonyms:
    - term: recovery
      weight: 0.7
  reinstatement:
    label: reinstatement
    standard_code: reinstatement
    ca_id: trm_502403240a2a2
    definition_text: following extinction, conditioned response returns after exposure
      to unconditional stimulus (US) alone
  blindsight:
    label: blindsight
    standard_code: blindsight
    ca_id: trm_5029515e29f7f
    definition_text: unconscious visual perception, i.e. a phenomenon in which people
      can detect, discriminate between, and respond to visual stimuli without being
      consciously aware of them
    synonyms:
    - term: blind sight
      weight: 0.7
  feature_integration:
    label: feature integration
    standard_code: feature_integration
    ca_id: trm_502954662d63e
    definition_text: how different features of a percept are bound into a conscious
      whole
  transduction:
    label: transduction
    standard_code: transduction
    ca_id: trm_50297454e516b
    definition_text: in which information from stimuli is transduced into signals
      to the brain
    part_of:
    - visual_perception
  phototransduction:
    label: phototransduction
    standard_code: phototransduction
    ca_id: trm_5029751d118c4
    definition_text: in which energy from visual stimuli is transduced into a signal
      in the retina to the brain
    part_of:
    - visual_perception
  border_ownership:
    label: border ownership
    standard_code: border_ownership
    ca_id: trm_502ab8dd991bf
    definition_text: the determination of a local feature (i.e. a contrast edge or
      line) and the object to which it belongs
    broader:
    - feature_detection
    part_of:
    - visual_perception
    - figure_ground_segregation
  multistable_perception:
    label: multistable perception
    standard_code: multistable_perception
    ca_id: trm_502abeab4e1d8
    definition_text: conflicting sensory input results in spontaneous, sometimes controllable,
      experiences thereof
    broader:
    - auditory_perception
    - olfactory_perception
    - visual_perception
  visual_orientation:
    label: visual orientation
    standard_code: visual_orientation
    ca_id: trm_502ad54c11389
    definition_text: use of visual stimulus information in perceiving orientation
      thereof or of the self
    broader:
    - visual_perception
    part_of:
    - body_orientation
  lateral_masking:
    label: lateral masking
    standard_code: lateral_masking
    ca_id: trm_502bdc6bdaa2b
    definition_text: perceptual phenomenon in which one stimulus attenuates signals
      generated by another, adjacent, stimulus presented simultaneously
    broader:
    - visual_masking
    part_of:
    - visual_perception
  crowding:
    label: crowding
    standard_code: crowding
    ca_id: trm_502c139d5ed78
    definition_text: target stimulus is made harder to identify when surrounded by
      similar non-target stimuli
    broader:
    - visual_masking
  lexeme:
    label: lexeme
    standard_code: lexeme
    ca_id: trm_502c343d20523
    definition_text: the phonological form of a given lexical item being retrieved
    part_of:
    - lexicon
  trait_anxiety:
    label: trait anxiety
    standard_code: trait_anxiety
    ca_id: trm_50aff037c389f
    definition_text: a hyper-responsive system for threat detection, differentiated
      from state anxiety in duration and cause
  strength:
    label: strength
    standard_code: strength
    ca_id: trm_50eb5469ba37a
    definition_text: Strength refers to a muscle&#39;s ability to generate force against
      physical objects.
    broader:
    - motor_control
  balance:
    label: balance
    standard_code: balance
    ca_id: trm_50eb56a7867db
    definition_text: Balance allows humans to be able to orient the body in space,
      maintain an upright posture under static and dynamic conditions, and move without
      falling, by adjusting motoric control
    broader:
    - motor_control
  locomotion:
    label: locomotion
    standard_code: locomotion
    ca_id: trm_50eb692db57eb
    definition_text: 'Locomotion is the act of moving the body from one place to another.
      It requires input from the brain, spinal cord, peripheral nerves, muscular power
      and joint and cardiovascular health.  '
    broader:
    - motor_control
  vestibular_control:
    label: vestibular control
    standard_code: vestibular_control
    ca_id: trm_50f382d7abdff
    definition_text: The vestibular system transduces and processes angular and linear
      acceleration and deceleration of the head, enabling postural balance, locomotor
      control, and gaze stabilization, particularly during head movement. The vestibular
      system is an integral component of our sensory experience and sensory-motor
      function. Healthy peripheral and central vestibular anatomy is essential for
      functionally relevant gaze stability during head motion and postural control.
  life_satisfaction:
    label: life satisfaction
    standard_code: life_satisfaction
    ca_id: trm_50f3c0af04e37
    definition_text: "Oneâ\x80\x99s cognitive evaluation of life experiences; this\
      \ measure is concerned with whether people like their lives or not. Life satisfaction\
      \ includes both general (e.g., my life is going well) and domain-specific (e.g.,\
      \ I am satisfied with my family life) aspects. "
  attentional_bias:
    label: attentional bias
    standard_code: attentional_bias
    ca_id: trm_510059e54b2cf
    definition_text: 'Attentional bias refers to the tendency for a particular class
      of stimuli to capture attention. The term is most typically used to refer to
      biases related to emotional content in bottom-up-capture attention tasks. '
    synonyms:
    - term: Attention bias
      weight: 0.7
  reception_of_facial_communication:
    label: reception of facial communication
    standard_code: reception_of_facial_communication
    ca_id: trm_5154a9f45903f
    definition_text: "The capacity to perceive someoneâ\x80\x99s emotional state non-verbally\
      \ based on facial expressions. Examples include affect recognition, facial recognition\
      \ and characterization."
  productive_facial_communication:
    label: productive facial communication
    standard_code: productive_facial_communication
    ca_id: trm_5154aa9735134
    definition_text: "The capacity to convey oneâ\x80\x99s emotional state non-verbally\
      \ via facial expressions, including eye contact, expressive reciprocation, and\
      \ gaze following."
  reception_of_non_facial_communication:
    label: Reception of non-facial communication
    standard_code: reception_of_non_facial_communication
    ca_id: trm_5154b049c279f
    definition_text: The capacity to perceive social and emotional information based
      on modalities other than facial expression, including non-verbal gestures, affective
      prosody, distress calling, cooing, etc.
  production_of_non_facial_communication:
    label: Production of non-facial communication
    standard_code: production_of_non_facial_communication
    ca_id: trm_5154b23a3156a
    definition_text: The capacity to express social and emotional information based
      on modalities other than facial expression, including non-verbal gestures, affective
      prosody, distress calling, cooing, etc.
  agency:
    label: agency
    standard_code: agency
    ca_id: trm_5154b2f947fe9
    definition_text: "The ability to recognize oneâ\x80\x99s self as the agent of\
      \ oneâ\x80\x99s actions and thoughts, including the recognition of oneâ\x80\x99\
      s own body/body parts."
    part_of:
    - perception
  self_knowledge:
    label: self knowledge
    standard_code: self_knowledge
    ca_id: trm_5154b39a3193d
    definition_text: "The ability to make judgments about oneâ\x80\x99s current cognitive\
      \ or emotional internal states, traits, and/or abilities."
  animacy_perception:
    label: animacy perception
    standard_code: animacy_perception
    ca_id: trm_5159beaf80413
    definition_text: The ability to appropriately perceive that another entity is
      an agent (i.e., has a face, interacts contingently, and exhibits biological
      motion).
    broader:
    - perception
    - theory_of_mind
    part_of:
    - animacy_decision
  action_perception:
    label: action perception
    standard_code: action_perception
    ca_id: trm_5159c00c3dac3
    definition_text: The perception of an action being performed by an animate entity.
  understanding_mental_states:
    label: understanding mental states
    standard_code: understanding_mental_states
    ca_id: trm_5159c0a633cda
    definition_text: The ability to make judgments and/or attributions about the mental
      state of other animate entities that allows one to predict or interpret their
      behaviors. Mental state refers to intentions, beliefs, desires, and emotions.
  circadian_rhythm:
    label: circadian rhythm
    standard_code: circadian_rhythm
    ca_id: trm_5159c382bd8d4
    definition_text: 'Endogenous, self-sustaining oscillations that organize the timing
      of biological systems to optimize physiology, behavior, and health. Circadian
      rhythms are synchronized by recurring environmental cues and attempt to anticipate
      the external environment. They also modulate homeostasis within the brain and
      other systems, tissues, and organs. '
  sleep:
    label: sleep
    standard_code: sleep
    ca_id: trm_5159c70d0e98e
    definition_text: Sleep and wakefulness are endogenous, recurring, behavioral states
      that reflect coordinated changes in the dynamic functional organization of the
      brain and that optimize physiology, behavior, and health. Homeostatic and circadian
      processes regulate the propensity for wakefulness and sleep. Sleep is a reversible
      state, characterized by postural recumbence, behavioral quiescence, and reduced
      responsiveness. It involves predictable cycling of non-rapid eye movement (NREM)
      and rapid eye movement (REM). It is affected by experiences during wakefulness,
      and has restorative and transformative effects that optimize neurobehavioral
      functions during wakefulness.
  loss:
    label: loss
    standard_code: loss
    ca_id: trm_5159c80c1dd24
    definition_text: A state of deprivation of a motivationally significant con-specific,
      object, or situation. Loss may be social or non-social and may include permanent
      or sustained loss of monetary values, shelter, behavioral control, status, loved
      ones, or relationships. The response to loss may be episodic (e.g., grief) or
      sustained.
    part_of:
    - loss_aversion
  defensive_aggression:
    label: defensive aggression
    standard_code: defensive_aggression
    ca_id: trm_5159c885a7314
    definition_text: A response elicited by a real or perceived threat that leads
      to a pattern of behaviors directed at terminating the threat.
  offensive_aggression:
    label: offensive aggression
    standard_code: offensive_aggression
    ca_id: trm_5159c8a5d3d13
    definition_text: A response elicited by competition over resource acquisition
      or other positive consequences. This form of aggression often arises from differences
      in social status and dominance.
    synonyms:
    - term: proactive aggression
      weight: 0.7
  reward_valuation:
    label: reward valuation
    standard_code: reward_valuation
    ca_id: trm_5159c94667677
    definition_text: Processes by which the probability and benefits of a prospective
      outcome are computed and calibrated by reference to external information, social
      context (e.g., group input, counterfactual comparisons), and/or prior experience.
      This calibration is influenced by pre-existing biases, learning, memory, stimulus
      characteristics, and deprivation states. Reward valuation may involve the assignment
      of incentive salience to stimuli.
    part_of:
    - reward_learning
  effort_valuation:
    label: effort valuation
    standard_code: effort_valuation
    ca_id: trm_5159c971bf444
    definition_text: Processes by which the cost(s) of obtaining an outcome is computed;
      tendency to overcome response costs to obtain a reinforcer.
    synonyms:
    - term: willingness to work
      weight: 0.7
  reward_learning:
    label: reward learning
    standard_code: reward_learning
    ca_id: trm_5159cb12a0f92
    definition_text: A process by which organisms acquire information about stimuli,
      actions, and contexts that predict positive outcomes, and by which behavior
      is modified when a novel reward occurs or outcomes are better than expected.
      Reward learning is a type of reinforcement learning, and similar processes may
      be involved in learning related to negative reinforcement.
    broader:
    - reinforcement_learning
  semantic_network:
    label: semantic network
    standard_code: semantic_network
    ca_id: trm_51838baad343e
    definition_text: Set of concepts and relations
    synonyms:
    - term: ontology
      weight: 0.7
  cognitive_training:
    label: cognitive training
    standard_code: cognitive_training
    ca_id: trm_51a6905a3f021
    definition_text: Targeted exercises designed to help improve mental capacities.
  emotion_regulation:
    label: emotion regulation
    standard_code: emotion_regulation
    ca_id: trm_51a690a7492eb
    definition_text: 'The ability to have control over and change emotional responses,
      such as feelings and behaviors associated with them. '
    broader:
    - self_control
    part_of:
    - emotional_expression
  neuroplasticity:
    label: neuroplasticity
    standard_code: neuroplasticity
    ca_id: trm_51a690eeadcb7
    definition_text: The brain&#39;s ability to change in structure and function through
      experience.
  restricted_behavior:
    label: restricted behavior
    standard_code: restricted_behavior
    ca_id: trm_52068e5bd9aa1
    definition_text: A restricted behavior is a stereotyped pattern of behavior, activity,
      or interest. Examples include preoccupation with an object, activity, or topic,
      and this preoccupation is abnormal in intensity or focus.  Individuals with
      restricted behaviors may find it challenging to break away from habit or routine.
    synonyms:
    - term: repetitive behavior
      weight: 0.7
    - term: stereotyped behavior
      weight: 0.7
  social_motivation:
    label: social motivation
    standard_code: social_motivation
    ca_id: trm_52090251db8c8
    definition_text: An individual&#39;s tendency to seek out direct contact with
      another person or a group of people.
  irritability:
    label: irritability
    standard_code: irritability
    ca_id: trm_523c7afe39f78
    definition_text: The quality or state of being agitated, testy, grumpy, moody,
      or having a short temper.
    synonyms:
    - term: anger
      weight: 0.7
    - term: agitation
      weight: 0.7
    - term: moodiness
      weight: 0.7
    - term: testy
      weight: 0.7
    - term: grumpy
      weight: 0.7
    - term: short tempered
      weight: 0.7
  lethargy:
    label: lethargy
    standard_code: lethargy
    ca_id: trm_523c7ba79c2f1
    definition_text: a lack of energy or enthusiasm.  In a social context, this means
      being socially withdrawn.
    synonyms:
    - term: slow
      weight: 0.7
    - term: socially withdrawn
      weight: 0.7
  hyperactivity:
    label: hyperactivity
    standard_code: hyperactivity
    ca_id: trm_523c7c13bc55f
    definition_text: a condition characterized by excessive restlessness and movement,
      and commonly non-compliance
    synonyms:
    - term: restlessness
      weight: 0.7
    - term: movement
      weight: 0.7
    - term: non-compliance
      weight: 0.7
  inappropriate_speech:
    label: Inappropriate speech
    standard_code: inappropriate_speech
    ca_id: trm_523c7c886b614
    definition_text: dialogue, either to oneself or others, that is not appropriate
      or suitable to the current situation
  internalizing:
    label: internalizing
    standard_code: internalizing
    ca_id: trm_523ca7e778c50
    definition_text: focusing negative energy on the self, often through holding back
      emotion, often leading to less than ideal emotional states (worry, anxiety,
      negativity and depression).  These states are frequently present in autistic
      children.
    synonyms:
    - term: worry
      weight: 0.7
    - term: anxiety
      weight: 0.7
    - term: negativity
      weight: 0.7
    - term: depression
      weight: 0.7
  externalizing:
    label: externalizing
    standard_code: externalizing
    ca_id: trm_523ca883711cc
    definition_text: attributing cause to factors outside of the self
    synonyms:
    - term: attribution bias
      weight: 0.7
  conduct_disorder:
    label: conduct disorder
    standard_code: conduct_disorder
    ca_id: trm_523e00f356226
    definition_text: Lacking regard for others and callous, unemotional.  Characterized
      by repetitive and persistent pattern of behavior in which the basic rights of
      others or major age-appropriate norms are violated.
    synonyms:
    - term: callous
      weight: 0.7
    - term: antisocial
      weight: 0.7
    - term: unemotional
      weight: 0.7
  antisocial_personality:
    label: antisocial personality
    standard_code: antisocial_personality
    ca_id: trm_523e024c14df9
    definition_text: avoiding the company of other people, unsociable, sometimes to
      the extent of injuring others or the interests of society in general
    synonyms:
    - term: hermit
      weight: 0.7
    - term: introvert
      weight: 0.7
  defiance:
    label: defiance
    standard_code: defiance
    ca_id: trm_523e034f9e69a
    definition_text: bold resistance to an opposing force, power, or authority, expressed
      through behavior and attitude
    synonyms:
    - term: disobedient
      weight: 0.7
    - term: oppositional
      weight: 0.7
  obsession:
    label: obsession
    standard_code: obsession
    ca_id: trm_523e0419ec219
    definition_text: compulsive preoccupation with a fixed idea or an unwanted feeling
      or emotion, often accompanied by symptoms of anxiety
  social_phobia:
    label: social phobia
    standard_code: social_phobia
    ca_id: trm_523e053844495
    definition_text: having a fear so strong of being judged by others and of being
      embarrassed that it significantly gets in the way of everyday life
    broader:
    - fear
    synonyms:
    - term: embarrassment
      weight: 0.7
  rigidity:
    label: rigidity
    standard_code: rigidity
    ca_id: trm_523e0a4b443dc
    definition_text: unable to stray from a particular pattern of behavior or thought
    broader:
    - obsession
  agreeableness:
    label: agreeableness
    standard_code: agreeableness
    ca_id: trm_523f5ee64102c
    definition_text: "Agreeableness is a personality trait manifesting itself in individual\
      \ behavioral characteristics that are perceived as kind, sympathetic, cooperative,\
      \ warm and considerate.\r\n\r\nhttp://en.wikipedia.org/wiki/Agreeableness"
    synonyms:
    - term: kind
      weight: 0.7
    - term: sympathetic
      weight: 0.7
    - term: cooperative
      weight: 0.7
    - term: warm
      weight: 0.7
  openness:
    label: openness
    standard_code: openness
    ca_id: trm_523f5f918cb2c
    definition_text: "Openness to experience is one of the domains which are used\
      \ to describe human personality in the Five Factor Model. Openness involves\
      \ active imagination, aesthetic sensitivity, attentiveness to inner feelings,\
      \ preference for variety, and intellectual curiosity.\r\n\r\nhttp://en.wikipedia.org/wiki/Openness_to_experience"
    synonyms:
    - term: imaginative
      weight: 0.7
    - term: open
      weight: 0.7
    - term: curious
      weight: 0.7
  psychosis:
    label: psychosis
    standard_code: psychosis
    ca_id: trm_52405de6b7a63
    definition_text: A kind of disordered thinking for which thought and emotions
      are so impaired that contact is lost with external reality.
  paranoia:
    label: paranoia
    standard_code: paranoia
    ca_id: trm_52405e33adafa
    definition_text: a mental condition characterized by delusions of persecution,
      unwarranted jealousy, or exaggerated self-importance, typically elaborated into
      an organized system. It may be an aspect of chronic personality disorder, of
      drug abuse, or of a serious condition such as schizophrenia in which the person
      loses touch with reality.
    synonyms:
    - term: delusional
      weight: 0.7
  phonological_awareness:
    label: phonological awareness
    standard_code: phonological_awareness
    ca_id: trm_5240fddc2e43e
    definition_text: Explicit awareness of the abstract units that compose spoken
      words, including syllables, onset and rime units, and individual phonemes.
  guilt:
    label: guilt
    standard_code: guilt
    ca_id: trm_52583d9f2ad98
    definition_text: a cognitive or an emotional experience that occurs when a person
      realizes or believes (whether it is true or not) that he or she has compromised
      his or her own standards of conduct or has violated a moral standard, and bears
      significant responsibility for that violation.
    synonyms:
    - term: remorse
      weight: 0.7
  anhedonia:
    label: anhedonia
    standard_code: anhedonia
    ca_id: trm_52583dceb345e
    definition_text: lack of interest
  appetite:
    label: appetite
    standard_code: appetite
    ca_id: trm_52583e083c9ab
    definition_text: the desire to eat food
    synonyms:
    - term: hunger
      weight: 0.7
  fatigue:
    label: fatigue
    standard_code: fatigue
    ca_id: trm_52583e52d5e7a
    definition_text: a feeling of weariness, tiredness, or lack of energy
    synonyms:
    - term: tiredness
      weight: 0.7
  suicidal_ideation:
    label: suicidal ideation
    standard_code: suicidal_ideation
    ca_id: trm_52583e8a46ded
    definition_text: thoughts about or an unusual preoccupation with suicide
    synonyms:
    - term: suicidal
      weight: 0.7
    - term: suicidal thoughts
      weight: 0.7
  perfectionism:
    label: perfectionism
    standard_code: perfectionism
    ca_id: trm_525c58f9aabae
    definition_text: a personality trait characterized by a person&#39;s striving
      for flawlessness and setting excessively high performance standards, accompanied
      by overly critical self-evaluations and concerns regarding others&#39; evaluations.
  eating:
    label: eating
